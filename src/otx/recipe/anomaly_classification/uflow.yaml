model:
  class_path: otx.algo.anomaly.uflow.Uflow
  init_args:
    backbone: "resnet18"
    flow_steps: 4
    affine_clamp: 2.0
    affine_subnet_channels_ratio: 1.0
    permute_soft: False
    task: ANOMALY_CLASSIFICATION

engine:
  task: ANOMALY_CLASSIFICATION
  device: auto

callback_monitor: image_F1Score

data:
  task: ANOMALY_CLASSIFICATION
  input_size: [448, 448]
  data_format: mvtec
  mem_cache_size: 1GB
  mem_cache_img_max_size: null
  image_color_channel: RGB
  stack_images: false
  unannotated_items_ratio: 0.0
  train_subset:
    subset_name: train
    transform_lib_type: TORCHVISION
    to_tv_image: true
    batch_size: 32
    num_workers: 4
    transforms:
      - class_path: torchvision.transforms.v2.Resize
        init_args:
          size: [448, 448]
          antialias: true
      - class_path: torchvision.transforms.v2.ToDtype
        init_args:
          dtype: ${as_torch_dtype:torch.float32}
          scale: false
      - class_path: torchvision.transforms.v2.Normalize
        init_args:
          mean: [123.675, 116.28, 103.53]
          std: [58.395, 57.12, 57.375]
    sampler:
      class_path: torch.utils.data.RandomSampler

  val_subset:
    subset_name: test
    transform_lib_type: TORCHVISION
    to_tv_image: true
    batch_size: 32
    num_workers: 4
    transforms:
      - class_path: torchvision.transforms.v2.Resize
        init_args:
          size: [448, 448]
          antialias: true
      - class_path: torchvision.transforms.v2.ToDtype
        init_args:
          dtype: ${as_torch_dtype:torch.float32}
          scale: false
      - class_path: torchvision.transforms.v2.Normalize
        init_args:
          mean: [123.675, 116.28, 103.53]
          std: [58.395, 57.12, 57.375]
    sampler:
      class_path: torch.utils.data.RandomSampler

  test_subset:
    subset_name: test
    transform_lib_type: TORCHVISION
    to_tv_image: true
    batch_size: 32
    num_workers: 4
    transforms:
      - class_path: torchvision.transforms.v2.Resize
        init_args:
          size: [448, 448]
          antialias: true
      - class_path: torchvision.transforms.v2.ToDtype
        init_args:
          dtype: ${as_torch_dtype:torch.float32}
          scale: false
      - class_path: torchvision.transforms.v2.Normalize
        init_args:
          mean: [123.675, 116.28, 103.53]
          std: [58.395, 57.12, 57.375]
    sampler:
      class_path: torch.utils.data.RandomSampler

overrides:
  precision: 32
  max_epochs: 200
  num_sanity_val_steps: 0
  callbacks:
    - class_path: otx.algo.callbacks.adaptive_train_scheduling.AdaptiveTrainScheduling
      init_args:
        max_interval: 1
