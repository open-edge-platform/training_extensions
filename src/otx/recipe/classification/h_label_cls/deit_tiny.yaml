task: H_LABEL_CLS
model:
  class_path: otx.backend.native.models.classification.hlabel_models.vit.VisionTransformerHLabelCls
  init_args:
    model_name: "vit-tiny"

    optimizer:
      class_path: torch.optim.AdamW
      init_args:
        lr: 0.0001
        weight_decay: 0.05

    scheduler:
      class_path: otx.backend.native.schedulers.LinearWarmupSchedulerCallable
      init_args:
        num_warmup_steps: 0
        main_scheduler_callable:
          class_path: lightning.pytorch.cli.ReduceLROnPlateau
          init_args:
            mode: max
            factor: 0.5
            patience: 3
            monitor: val/accuracy

engine:
  device: auto

callback_monitor: val/accuracy

data: ../../_base_/data/classification.yaml
overrides:
  max_epochs: 90

  data:
    task: H_LABEL_CLS
    data_format: datumaro

  callbacks:
    - class_path: otx.backend.native.callbacks.adaptive_early_stopping.EarlyStoppingWithWarmup
      init_args:
        patience: 5
