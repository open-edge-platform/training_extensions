model:
  class_path: otx.algo.classification.multiclass_models.vit.VisionTransformerMulticlassCls
  init_args:
    label_info: 1000
    model_name: "dinov2-small"

    optimizer:
      class_path: torch.optim.AdamW
      init_args:
        lr: 0.0001  
        weight_decay: 0.02  

    scheduler:
      class_path: otx.core.schedulers.LinearWarmupSchedulerCallable
      init_args:
        num_warmup_steps: 0
        main_scheduler_callable:
          class_path: lightning.pytorch.cli.ReduceLROnPlateau
          init_args:
            mode: max
            factor: 0.5
            patience: 2  
            monitor: val/accuracy

engine:
  task: MULTI_CLASS_CLS
  device: auto

callback_monitor: val/accuracy

data: ../../_base_/data/classification.yaml

overrides:
  max_epochs: 90

  
  augmentations:
    train:
      - class_path: torchvision.transforms.RandomResizedCrop
        init_args:
          size: 224
      - class_path: torchvision.transforms.RandomHorizontalFlip
        init_args:
          p: 0.5
      - class_path: torchvision.transforms.ColorJitter
        init_args:
          brightness: 0.4
          contrast: 0.4
          saturation: 0.4
          hue: 0.1
      - class_path: torchvision.transforms.RandomErasing
        init_args:
          p: 0.2

  callbacks:
    - class_path: otx.algo.callbacks.adaptive_early_stopping.EarlyStoppingWithWarmup
      init_args:
        patience: 3  
