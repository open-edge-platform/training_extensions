model:
  class_path: otx.algo.classification.multiclass_models.vit.VisionTransformerMulticlassCls
  init_args:
    label_info: 1000
    model_name: "dinov2-small"

    optimizer:
      class_path: torch.optim.AdamW
      init_args:
        lr: 0.0008  # Increased learning rate for better training
        weight_decay: 0.02  # Reduced weight decay

    scheduler:
      class_path: otx.core.schedulers.LinearWarmupSchedulerCallable
      init_args:
        num_warmup_steps: 5  # Small warm-up for stability
        main_scheduler_callable:
          class_path: torch.optim.lr_scheduler.CosineAnnealingLR
          init_args:
            T_max: 120
            eta_min: 1e-06

engine:
  task: MULTI_CLASS_CLS
  device: auto

callback_monitor: val/accuracy

data: ../../_base_/data/classification.yaml

overrides:
  max_epochs: 120  # Increased epochs for better convergence

  callbacks:
    - class_path: otx.algo.callbacks.adaptive_early_stopping.EarlyStoppingWithWarmup
      init_args:
        patience: 10  # Increased patience to allow more training
