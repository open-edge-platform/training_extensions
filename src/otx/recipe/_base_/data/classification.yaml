task: MULTI_CLASS_CLS 
input_size:
  - 256  # Increased input size for better feature extraction
  - 256
mem_cache_size: 1GB
mem_cache_img_max_size:
  - 500
  - 500
image_color_channel: RGB
data_format: imagenet_with_subset_dirs
unannotated_items_ratio: 0.0

train_subset:
  subset_name: train
  transform_lib_type: TORCHVISION
  batch_size: 64
  num_workers: 2
  to_tv_image: false
  transforms:
    - class_path: otx.core.data.transform_libs.torchvision.RandomResizedCrop
      init_args:
        scale: [256, 256]  # Adjusted scale
    - class_path: otx.core.data.transform_libs.torchvision.PhotoMetricDistortion
      enable: true  # Enabled color distortions
    - class_path: otx.core.data.transform_libs.torchvision.RandomAffine
      enable: true  # Enabled affine transformations
    - class_path: otx.core.data.transform_libs.torchvision.RandomFlip
      init_args:
        prob: 0.5
        is_numpy_to_tvtensor: true
    - class_path: torchvision.transforms.v2.RandomVerticalFlip
      enable: true  # Enabled vertical flipping
    - class_path: torchvision.transforms.v2.GaussianBlur
      enable: true
      init_args:
        kernel_size: 3  # Reduced blur intensity
    - class_path: torchvision.transforms.v2.GaussianNoise
      enable: true  # Enabled Gaussian noise
    - class_path: otx.core.data.transform_libs.torchvision.MixUp
      enable: true
      init_args:
        alpha: 0.2  # Mixup strength
    - class_path: otx.core.data.transform_libs.torchvision.CutMix
      enable: true
      init_args:
        alpha: 1.0  # CutMix strength
    - class_path: torchvision.transforms.v2.ToDtype
      init_args:
        dtype: ${as_torch_dtype:torch.float32}
        scale: false
    - class_path: torchvision.transforms.v2.Normalize
      init_args:
        mean: [123.675, 116.28, 103.53]
        std: [58.395, 57.12, 57.375]

  sampler:
    class_path: otx.algo.samplers.balanced_sampler.BalancedSampler

val_subset:
  subset_name: val
  transform_lib_type: TORCHVISION
  batch_size: 64
  num_workers: 2
  to_tv_image: false
  transforms:
    - class_path: otx.core.data.transform_libs.torchvision.Resize
      init_args:
        scale: [256, 256]  # Updated input size
        is_numpy_to_tvtensor: true
    - class_path: torchvision.transforms.v2.ToDtype
      init_args:
        dtype: ${as_torch_dtype:torch.float32}
        scale: false
    - class_path: torchvision.transforms.v2.Normalize
      init_args:
        mean: [123.675, 116.28, 103.53]
        std: [58.395, 57.12, 57.375]
  sampler:
    class_path: torch.utils.data.RandomSampler

test_subset:
  subset_name: test
  transform_lib_type: TORCHVISION
  batch_size: 64
  num_workers: 2
  to_tv_image: false
  transforms:
    - class_path: otx.core.data.transform_libs.torchvision.Resize
      init_args:
        scale: [256, 256]
        is_numpy_to_tvtensor: true
    - class_path: torchvision.transforms.v2.ToDtype
      init_args:
        dtype: ${as_torch_dtype:torch.float32}
        scale: false
    - class_path: torchvision.transforms.v2.Normalize
      init_args:
        mean: [123.675, 116.28, 103.53]
        std: [58.395, 57.12, 57.375]
  sampler:
    class_path: torch.utils.data.RandomSampler
