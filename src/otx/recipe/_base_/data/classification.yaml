task: MULTI_CLASS_CLS
input_size:
  - 224
  - 224
mem_cache_size: 1GB
mem_cache_img_max_size:
  - 500
  - 500
image_color_channel: RGB
data_format: imagenet_with_subset_dirs
unannotated_items_ratio: 0.0
train_subset:
  subset_name: train
  transform_lib_type: TORCHVISION
  batch_size: 64
  num_workers: 2
  to_tv_image: false
  transforms:
    - class_path: otx.core.data.transform_libs.torchvision.RandomResizedCrop
      init_args:
        scale:
          - 256 # Increased scale for RandomResizedCrop
          - 256
    - class_path: torchvision.transforms.v2.RandomHorizontalFlip
      p: 0.5
    - class_path: torchvision.transforms.v2.ColorJitter # Replaces PhotoMetricDistortion
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
    - class_path: torchvision.transforms.v2.RandomAffine # Add RandomAffine
      degrees: 15
      translate:
        - 0.1
        - 0.1
      scale:
        - 0.9
        - 1.1
      shear: 10
    - class_path: torchvision.transforms.v2.RandomGrayscale # Add RandomGrayscale
      p: 0.1
    - class_path: torchvision.transforms.v2.RandomErasing # Add RandomErasing
      p: 0.5
      scale:
        - 0.02
        - 0.33
      ratio:
        - 0.3
        - 3.3
    - class_path: torchvision.transforms.v2.GaussianBlur # Add GaussianBlur
      kernel_size: 5
    - class_path: torchvision.transforms.v2.ToDtype
      init_args:
        dtype: ${as_torch_dtype:torch.float32}
        scale: false
    - class_path: torchvision.transforms.v2.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: otx.algo.samplers.balanced_sampler.BalancedSampler
val_subset:
  subset_name: val
  transform_lib_type: TORCHVISION
  batch_size: 64
  num_workers: 2
  to_tv_image: false
  transforms:
    - class_path: otx.core.data.transform_libs.torchvision.Resize
      init_args:
        scale:
          - 224
          - 224
        is_numpy_to_tvtensor: true
    - class_path: torchvision.transforms.v2.ToDtype
      init_args:
        dtype: ${as_torch_dtype:torch.float32}
        scale: false
    - class_path: torchvision.transforms.v2.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: torch.utils.data.RandomSampler
test_subset:
  subset_name: test
  transform_lib_type: TORCHVISION
  batch_size: 64
  num_workers: 2
  to_tv_image: false
  transforms:
    - class_path: otx.core.data.transform_libs.torchvision.Resize
      init_args:
        scale:
          - 224
          - 224
        is_numpy_to_tvtensor: true
    - class_path: torchvision.transforms.v2.ToDtype
      init_args:
        dtype: ${as_torch_dtype:torch.float32}
        scale: false
    - class_path: torchvision.transforms.v2.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: torch.utils.data.RandomSampler