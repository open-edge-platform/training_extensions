# Default tracker configuration.
algorithm: bytetrack
verbose: false
# Detection filtering, applied before tracking.
score_threshold: 0.1
class_filter: null
# Detection-to-track matching.
match_threshold: 0.8
high_score_threshold: 0.5
match_class_only: true
lifecycle:
  max_age: 30
  min_hits: 2
  tentative_max_age: 0
motion:
  process_noise: 1.0
  measurement_noise: 1.0
  velocity_decay: 1.0
interpolation:
  enabled: true
  method: linear
  max_gap: 5
  smoothing_window: 5
  online_buffer: 0
