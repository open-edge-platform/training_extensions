ignore-policy: ""
ignorefile: .trivyignore
insecure: false
scan:
  scanners:
    - vuln
    - secret
    - misconfig
  slow: false
severity: LOW,MEDIUM,HIGH,CRITICAL
exit-code: 1
vulnerability:
  ignore-unfixed: false
format: template
template: "@.ci/csv.tmpl"
output: trivy-results.csv
list-all-pkgs: true
debug: true
