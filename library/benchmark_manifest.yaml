      - name: rfdetr_large
        priority: extended
        recipe: detection/rfdetr_large.yaml

      - name: deim_dfine_x
        priority: extended
        recipe: detection/deim_dfine_x.yaml

      - name: deim_dfine_l
        priority: extended
        recipe: detection/deim_dfine_l.yaml

      - name: deim_dfine_m
        priority: extended
