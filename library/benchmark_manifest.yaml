      - name: deimv2_l
        priority: extended
        recipe: detection/deimv2_l.yaml

      - name: deimv2_m
        priority: extended
        recipe: detection/deimv2_m.yaml

      - name: deimv2_s
        priority: extended
        recipe: detection/deimv2_s.yaml

    datasets:
      - allround

    criteria:
      accuracy_metric: mAP
      thresholds:
        "training:val/{metric}": { compare: ">=", margin: 0.10 }
        "torch:test/{metric}": { compare: ">=", margin: 0.10 }
        "export:test/{metric}": { compare: ">=", margin: 0.10 }
        "training:e2e_time": { compare: "<=", margin: 0.10 }
        "training:gpu_mem": { compare: "<=", margin: 0.10 }
        "torch:test/latency": { compare: "<=", margin: 0.15 }
  semantic_segmentation:
