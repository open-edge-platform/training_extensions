      - name: yolox_tiny
        priority: extended
        recipe: detection/yolox_tiny.yaml

      - name: yolox_l
        priority: extended
        recipe: detection/yolox_l.yaml

      - name: yolox_x
        priority: extended
        recipe: detection/yolox_x.yaml

      - name: rtdetr_50
        priority: extended
        recipe: detection/rtdetr_50.yaml

      - name: rfdetr_small
        priority: extended
        recipe: detection/rfdetr_small.yaml

      - name: rfdetr_medium
        priority: extended
