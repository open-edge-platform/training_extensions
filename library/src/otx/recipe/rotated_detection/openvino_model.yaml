task: ROTATED_DETECTION
model:
  class_path: otx.core.model.instance_segmentation.OVInstanceSegmentationModel
  init_args:
    label_info: 80
    model_name: openvino.xml
    model_type: MaskRCNN
    async_inference: true
    use_throughput_mode: true

engine:
  device: cpu

callback_monitor: val/map_50

data: ../_base_/data/instance_segmentation.yaml

overrides:
  task: ROTATED_DETECTION
  reset:
    - data.train_subset.augmentations_cpu
    - data.train_subset.augmentations_gpu
    - data.test_subset.augmentations_cpu

  data:
    train_subset:
      augmentations_cpu:
        - class_path: otx.data.augmentation.transforms.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: false
      augmentations_gpu: []
    test_subset:
      batch_size: 24
      augmentations_cpu:
        - class_path: otx.data.augmentation.transforms.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: false
            resize_targets: false
      augmentations_gpu: []
