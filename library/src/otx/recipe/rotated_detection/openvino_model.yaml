task: ROTATED_DETECTION
model:
  class_path: otx.core.model.instance_segmentation.OVInstanceSegmentationModel
  init_args:
    label_info: 80
    model_name: openvino.xml
    model_type: MaskRCNN
    async_inference: true
    use_throughput_mode: true

engine:
  device: cpu

callback_monitor: val/map_50

data: ../_base_/data/instance_segmentation.yaml

overrides:
  task: ROTATED_DETECTION
  reset:
    - data.train_subset.augmentations_cpu
    - data.val_subset.augmentations_cpu
    - data.test_subset.augmentations_cpu

  data:
    stack_images: false
    train_subset:
      to_tv_image: true
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.ToImage
    val_subset:
      to_tv_image: true
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.ToImage
    test_subset:
      to_tv_image: true
      batch_size: 24
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.ToImage
