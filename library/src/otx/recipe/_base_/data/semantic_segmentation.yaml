task: SEMANTIC_SEGMENTATION
input_size:
  - 512
  - 512
data_format: common_semantic_segmentation_with_subset_dirs
unannotated_items_ratio: 0.0
ignore_index: 255
train_subset:
  subset_name: train
  batch_size: 8
  num_workers: 4
  transform_lib_type: TORCHVISION
  to_tv_image: true
  transforms:
    - class_path: otx.data.transform_libs.torchvision.RandomResizedCrop
      init_args:
        scale: $(input_size)
        crop_ratio_range:
          - 0.2
          - 1.0
        aspect_ratio_range:
          - 0.5
          - 2.0
        transform_mask: true
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

val_subset:
  subset_name: val
  batch_size: 8
  num_workers: 4
  transform_lib_type: TORCHVISION
  to_tv_image: true
  transforms:
    - class_path: otx.data.transform_libs.torchvision.Resize
      init_args:
        scale: $(input_size)
        transform_mask: true
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

test_subset:
  subset_name: test
  num_workers: 4
  batch_size: 8
  transform_lib_type: TORCHVISION
  to_tv_image: true
  transforms:
    - class_path: otx.data.transform_libs.torchvision.Resize
      init_args:
        scale: $(input_size)
        transform_mask: true
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null
