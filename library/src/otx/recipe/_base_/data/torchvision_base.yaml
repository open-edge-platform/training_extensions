task: MULTI_CLASS_CLS
unannotated_items_ratio: 0.0

train_subset:
  subset_name: train
  batch_size: 1
  num_workers: 2
  augmentations_cpu: []
  augmentations_gpu:
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

