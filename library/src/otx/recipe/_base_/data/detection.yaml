task: DETECTION
input_size:
  - 800
  - 992
image_color_channel: RGB
data_format: coco_instances
unannotated_items_ratio: 0.0
train_subset:
  subset_name: train
  transform_lib_type: TORCHVISION
  batch_size: 8
  num_workers: 4
  to_tv_image: false
  transforms:
    - class_path: torchvision.transforms.v2.RandomIoUCrop
    - class_path: torchvision.transforms.v2.SanitizeBoundingBoxes
      init_args:
        min_size: 1
    - class_path: torchvision.transforms.v2.Resize
      init_args:
        size: $(input_size)
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

val_subset:
  subset_name: val
  transform_lib_type: TORCHVISION
  batch_size: 8
  num_workers: 4
  to_tv_image: true
  transforms:
    - class_path: torchvision.transforms.v2.Resize
      init_args:
        size: $(input_size)
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

test_subset:
  subset_name: test
  transform_lib_type: TORCHVISION
  batch_size: 8
  num_workers: 4
  to_tv_image: true
  transforms:
    - class_path: torchvision.transforms.v2.Resize
      init_args:
        size: $(input_size)

  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null
