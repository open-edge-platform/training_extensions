task: DETECTION
input_size:
  - 800
  - 992
unannotated_items_ratio: 0.0

train_subset:
  subset_name: train
  batch_size: 8
  num_workers: 8
  augmentations_cpu:
    - class_path: otx.data.augmentation.transforms.RandomIoUCrop
    - class_path: torchvision.transforms.v2.SanitizeBoundingBoxes
      init_args:
        min_size: 1
    - class_path: otx.data.augmentation.transforms.Resize
      init_args:
        size: $(input_size)
        keep_aspect_ratio: false
  augmentations_gpu:
    - class_path: kornia.augmentation.RandomHorizontalFlip
      init_args:
        p: 0.5
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

val_subset:
  subset_name: val
  batch_size: 8
  num_workers: 8
  augmentations_cpu:
    - class_path: otx.data.augmentation.transforms.Resize
      init_args:
        size: $(input_size)
        keep_aspect_ratio: false
        resize_targets: false
  augmentations_gpu:
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

test_subset:
  subset_name: test
  batch_size: 8
  num_workers: 8
  augmentations_cpu:
    - class_path: otx.data.augmentation.transforms.Resize
      init_args:
        size: $(input_size)
        keep_aspect_ratio: false
        resize_targets: false
  augmentations_gpu:
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null
