task: KEYPOINT_DETECTION
data_format: coco_person_keypoints
unannotated_items_ratio: 0.0
image_color_channel: RGB
input_size:
  - 512
  - 512
train_subset:
  subset_name: train
  batch_size: 32
  num_workers: 2
  to_tv_image: true
  transforms:
    - class_path: otx.data.transform_libs.torchvision.TopdownAffine
      init_args:
        input_size: $(input_size)
        probability: 1.0
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

val_subset:
  subset_name: val
  batch_size: 32
  num_workers: 2
  transforms:
    - class_path: otx.data.transform_libs.torchvision.Resize
      init_args:
        scale: $(input_size)
        keep_ratio: true
        transform_keypoints: false
        is_numpy_to_tvtensor: false
    - class_path: otx.data.transform_libs.torchvision.Pad
      init_args:
        size: $(input_size)
        pad_val: 0
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

test_subset:
  subset_name: test
  batch_size: 32
  num_workers: 2
  transforms:
    - class_path: otx.data.transform_libs.torchvision.Resize
      init_args:
        scale: $(input_size)
        keep_ratio: true
        transform_keypoints: false
        is_numpy_to_tvtensor: false
    - class_path: otx.data.transform_libs.torchvision.Pad
      init_args:
        size: $(input_size)
        pad_val: 0
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null
