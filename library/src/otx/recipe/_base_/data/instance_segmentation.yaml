task: INSTANCE_SEGMENTATION
input_size:
  - 1024
  - 1024
data_format: coco_instances
unannotated_items_ratio: 0.0

train_subset:
  subset_name: train
  batch_size: 8
  num_workers: 4
  augmentations_cpu:
    - class_path: otx.data.transform_libs.torchvision.Resize
      init_args:
        size: $(input_size)
  augmentations_gpu:
    - class_path: kornia.augmentation.RandomHorizontalFlip
      init_args:
        p: 0.5
    # - class_path: kornia.augmentation.RandomAffine
    #   init_args:
    #     degrees: 15.0
    #     translate:
    #       - 0.1
    #       - 0.1
    #     scale:
    #       - 0.9
    #       - 1.1
    #     shear:
    #       - 5.0
    #       - 5.0
    #     p: 1.0
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

val_subset:
  subset_name: val
  batch_size: 8
  num_workers: 4
  augmentations_cpu:
    - class_path: otx.data.transform_libs.torchvision.Resize
      init_args:
        size: $(input_size)
        resize_targets: false
  augmentations_gpu:
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

test_subset:
  subset_name: test
  batch_size: 8
  num_workers: 4
  augmentations_cpu:
    - class_path: otx.data.transform_libs.torchvision.Resize
      init_args:
        size: $(input_size)
        resize_targets: false
  augmentations_gpu:
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null
