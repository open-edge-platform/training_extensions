task: MULTI_CLASS_CLS
input_size:
  - 224
  - 224
data_format: imagenet_with_subset_dirs
unannotated_items_ratio: 0.0
train_subset:
  subset_name: train
  batch_size: 64
  num_workers: 0
  augmentations_cpu:
    - class_path: torchvision.transforms.v2.RandomResizedCrop
      init_args:
        size: $(input_size)
        scale:
          - 0.08
          - 1.0
        ratio:
          - 0.75
          - 1.34
    - class_path: torchvision.transforms.v2.RandomHorizontalFlip
      init_args:
        p: 0.5
    - class_path: torchvision.transforms.v2.ToDtype
      init_args:
        dtype: ${as_torch_dtype:torch.float32}
        scale: true
  # GPU-stage augmentations (Kornia)
  augmentations_gpu:
    - class_path: kornia.augmentation.ColorJiggle
      init_args:
        brightness: 0.2
        contrast: 0.2
        saturation: 0.2
        hue: 0.05
        p: 0.5
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: otx.data.samplers.balanced_sampler.BalancedSampler
    init_args: null

val_subset:
  subset_name: val
  batch_size: 64
  num_workers: 0
  augmentations_cpu:
    - class_path: torchvision.transforms.v2.Resize
      init_args:
        size: $(input_size)
    - class_path: torchvision.transforms.v2.ToDtype
      init_args:
        dtype: ${as_torch_dtype:torch.float32}
        scale: true
  # Validation only needs normalization (same as train)
  augmentations_gpu:
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

test_subset:
  subset_name: test
  batch_size: 64
  num_workers: 0
  augmentations_cpu:
    - class_path: torchvision.transforms.v2.Resize
      init_args:
        size: $(input_size)
    - class_path: torchvision.transforms.v2.ToDtype
      init_args:
        dtype: ${as_torch_dtype:torch.float32}
        scale: true
  # Test only needs normalization (same as train)
  augmentations_gpu:
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null
