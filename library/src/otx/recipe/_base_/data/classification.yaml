task: MULTI_CLASS_CLS
input_size:
  - 224
  - 224
image_color_channel: RGB
data_format: imagenet_with_subset_dirs
unannotated_items_ratio: 0.0
train_subset:
  subset_name: train
  transform_lib_type: TORCHVISION
  batch_size: 64
  num_workers: 4
  to_tv_image: true
  transforms:
    - class_path: torchvision.transforms.v2.RandomResizedCrop
      init_args:
        size: $(input_size)
        scale:
          - 0.08
          - 1.0
        ratio:
          - 0.75
          - 1.34
  sampler:
    class_path: otx.data.samplers.balanced_sampler.BalancedSampler
    init_args: null

val_subset:
  subset_name: val
  transform_lib_type: TORCHVISION
  batch_size: 64
  num_workers: 4
  to_tv_image: true
  transforms:
    - class_path: torchvision.transforms.v2.Resize
      init_args:
        size: $(input_size)
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

test_subset:
  subset_name: test
  transform_lib_type: TORCHVISION
  batch_size: 64
  num_workers: 4
  to_tv_image: true
  transforms:
    - class_path: torchvision.transforms.v2.Resize
      init_args:
        size: $(input_size)
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null
