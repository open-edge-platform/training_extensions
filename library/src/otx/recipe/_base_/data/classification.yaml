task: MULTI_CLASS_CLS
input_size:
  - 224
  - 224
image_color_channel: RGB
data_format: imagenet_with_subset_dirs
unannotated_items_ratio: 0.0
train_subset:
  subset_name: train
  batch_size: 64
  num_workers: 4
  # NEW: CPU-stage augmentations (torchvision.transforms.v2)
  augmentations_cpu:
    - class_path: torchvision.transforms.v2.RandomResizedCrop
      init_args:
        size: $(input_size)
        scale:
          - 0.08
          - 1.0
        ratio:
          - 0.75
          - 1.34
    - class_path: torchvision.transforms.v2.RandomHorizontalFlip
      init_args:
        p: 0.5
    - class_path: torchvision.transforms.v2.ToDtype
      init_args:
        dtype: torch.float32
        scale: true
  # GPU-stage augmentations (Kornia) - to be added later
  augmentations_gpu: []
  sampler:
    class_path: otx.data.samplers.balanced_sampler.BalancedSampler
    init_args: null

val_subset:
  subset_name: val
  batch_size: 64
  num_workers: 4
  augmentations_cpu:
    - class_path: torchvision.transforms.v2.Resize
      init_args:
        size: $(input_size)
    - class_path: torchvision.transforms.v2.ToDtype
      init_args:
        dtype: torch.float32
        scale: true
  augmentations_gpu: []
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

test_subset:
  subset_name: test
  batch_size: 64
  num_workers: 4
  augmentations_cpu:
    - class_path: torchvision.transforms.v2.Resize
      init_args:
        size: $(input_size)
    - class_path: torchvision.transforms.v2.ToDtype
      init_args:
        dtype: torch.float32
        scale: true
  augmentations_gpu: []
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null
