# RF-DETR Large Recipe
# RF-DETR is a state-of-the-art real-time object detector from Roboflow based on
# DINOv2 backbone with a lightweight DETR decoder.
# Original implementation: https://github.com/roboflow/rf-detr
#
# Model specs:
#   - Parameters: ~128M
#   - Input size: 560x560
#   - Backbone: DINOv2 (ViT-Base with windowed attention)
#
# Original training settings from rfdetr:
#   - lr: 1e-4 (head), lr_encoder: 1.5e-4 (backbone)
#   - lr_vit_layer_decay: 0.8, lr_component_decay: 0.7
#   - weight_decay: 1e-4
#   - Multi-scale training with expanded scales

task: DETECTION
model:
  class_path: otx.backend.native.models.detection.rfdetr.RFDETR
  init_args:
    model_name: rfdetr_large
    label_info: 80
    multi_scale: false
    group_detr: 13

    optimizer:
      class_path: torch.optim.AdamW
      init_args:
        lr: 0.0001
        betas: [0.9, 0.999]
        weight_decay: 0.0001

    scheduler:
      class_path: otx.backend.native.schedulers.LinearWarmupSchedulerCallable
      init_args:
        num_warmup_steps: 0
        main_scheduler_callable:
          class_path: lightning.pytorch.cli.ReduceLROnPlateau
          init_args:
            mode: max
            factor: 0.1
            patience: 10
            monitor: val/f1-score

engine:
  device: auto

callback_monitor: val/f1-score

data: ../_base_/data/torchvision_base.yaml

callbacks:
  - class_path: otx.backend.native.callbacks.adaptive_train_scheduling.AdaptiveTrainScheduling
    init_args:
      max_interval: 1
      min_lrschedule_patience: 5
  - class_path: otx.backend.native.callbacks.adaptive_early_stopping.EarlyStoppingWithWarmup
    init_args:
      mode: max
      monitor: val/f1-score
      min_delta: 0.001
      warmup_iters: 100
      warmup_epochs: 10
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ""
      monitor: val/f1-score
      mode: max
      save_top_k: 1
      save_last: true
      auto_insert_metric_name: false
      filename: "checkpoints/epoch_{epoch:03d}"

overrides:
  data:
    input_size:
      - 560
      - 560
    task: DETECTION
    data_format: coco_instances
    train_subset:
      batch_size: 2
      transforms:
        # RF-DETR augmentation pipeline (similar to D-Fine)
        - class_path: torchvision.transforms.v2.RandomZoomOut
          enable: true
          init_args:
            fill: 0
        - class_path: otx.data.transform_libs.torchvision.RandomIoUCrop
          enable: true
          init_args:
            probability: 0.8
        - class_path: torchvision.transforms.v2.SanitizeBoundingBoxes
          init_args:
            min_size: 1
        - class_path: otx.data.transform_libs.torchvision.Resize
          init_args:
            scale: $(input_size)
            keep_ratio: false
            transform_bbox: true
        - class_path: otx.data.transform_libs.torchvision.RandomFlip
          enable: true
          init_args:
            probability: 0.5
        - class_path: torchvision.transforms.v2.ToDtype
          init_args:
            dtype: ${as_torch_dtype:torch.float32}
        - class_path: torchvision.transforms.v2.Normalize
          init_args:
            mean: [123.675, 116.28, 103.53]
            std: [58.395, 57.12, 57.375]
        - class_path: torchvision.transforms.v2.SanitizeBoundingBoxes
      sampler:
        class_path: otx.data.samplers.balanced_sampler.BalancedSampler

    val_subset:
      batch_size: 4
      transforms:
        - class_path: otx.data.transform_libs.torchvision.Resize
          init_args:
            scale: $(input_size)
            keep_ratio: false
        - class_path: torchvision.transforms.v2.ToDtype
          init_args:
            dtype: ${as_torch_dtype:torch.float32}
        - class_path: torchvision.transforms.v2.Normalize
          init_args:
            mean: [123.675, 116.28, 103.53]
            std: [58.395, 57.12, 57.375]

    test_subset:
      batch_size: 4
      transforms:
        - class_path: otx.data.transform_libs.torchvision.Resize
          init_args:
            scale: $(input_size)
            keep_ratio: false
        - class_path: torchvision.transforms.v2.ToDtype
          init_args:
            dtype: ${as_torch_dtype:torch.float32}
        - class_path: torchvision.transforms.v2.Normalize
          init_args:
            mean: [123.675, 116.28, 103.53]
            std: [58.395, 57.12, 57.375]
