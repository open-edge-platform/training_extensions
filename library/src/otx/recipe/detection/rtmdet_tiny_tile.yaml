task: DETECTION
model:
  class_path: otx.backend.native.models.detection.rtmdet.RTMDet
  init_args:
    model_name: rtmdet_tiny
    label_info: 80

    optimizer:
      class_path: torch.optim.AdamW
      init_args:
        lr: 0.0007
        weight_decay: 0.05

    scheduler:
      class_path: otx.backend.native.schedulers.LinearWarmupSchedulerCallable
      init_args:
        num_warmup_steps: 0
        main_scheduler_callable:
          class_path: lightning.pytorch.cli.ReduceLROnPlateau
          init_args:
            mode: max
            factor: 0.1
            patience: 4
            monitor: val/map_50

engine:
  device: auto

callback_monitor: val/map_50

data: ../_base_/data/detection_tile.yaml

callbacks:
  - class_path: otx.backend.native.callbacks.adaptive_early_stopping.EarlyStoppingWithWarmup
    init_args:
      mode: max
      patience: 10
      check_on_train_epoch_end: false
      monitor: val/map_50
      min_delta: 0.001
      warmup_iters: 30
      warmup_epochs: 3
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: "" # use engine.work_dir
      monitor: val/map_50
      mode: max
      save_top_k: 1
      save_last: true
      auto_insert_metric_name: false
      filename: "checkpoints/epoch_{epoch:03d}"

overrides:
  reset:
    - data.train_subset.augmentations_cpu
    - data.train_subset.augmentations_gpu
    - data.val_subset.augmentations_cpu
    - data.val_subset.augmentations_gpu
    - data.test_subset.augmentations_cpu
    - data.test_subset.augmentations_gpu
  gradient_clip_val: 35.0

  data:
    input_size:
      - 640
      - 640
    train_subset:
      batch_size: 8
      num_workers: 4
      augmentations_cpu:
        # Resize with aspect ratio preservation (pure torch)
        - class_path: otx.data.transform_libs.torchvision.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: true
            pad_value: 114
      augmentations_gpu:
        # Random horizontal flip (Kornia, GPU)
        - class_path: kornia.augmentation.RandomHorizontalFlip
          init_args:
            p: 0.5
        # Normalize (Kornia, GPU)
        - class_path: kornia.augmentation.Normalize
          init_args:
            mean:
              - 0.485
              - 0.456
              - 0.406
            std:
              - 0.229
              - 0.224
              - 0.225
    val_subset:
      batch_size: 8
      num_workers: 4
      augmentations_cpu:
        # Resize with aspect ratio preservation (pure torch)
        - class_path: otx.data.transform_libs.torchvision.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: true
            pad_value: 114
            resize_targets: false
      augmentations_gpu:
        # Normalize (Kornia, GPU)
        - class_path: kornia.augmentation.Normalize
          init_args:
            mean:
              - 0.485
              - 0.456
              - 0.406
            std:
              - 0.229
              - 0.224
              - 0.225
    test_subset:
      batch_size: 8
      num_workers: 4
      augmentations_cpu:
        # Resize with aspect ratio preservation (pure torch)
        - class_path: otx.data.transform_libs.torchvision.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: true
            pad_value: 114
            resize_targets: false
      augmentations_gpu:
        # Normalize (Kornia, GPU)
        - class_path: kornia.augmentation.Normalize
          init_args:
            mean:
              - 0.485
              - 0.456
              - 0.406
            std:
              - 0.229
              - 0.224
              - 0.225
