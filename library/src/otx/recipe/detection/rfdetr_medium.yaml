task: DETECTION
model:
  class_path: otx.backend.native.models.detection.rfdetr.RFDETR
  init_args:
    model_name: rfdetr_medium
    label_info: 91
    multi_scale: true

    optimizer:
      class_path: torch.optim.AdamW
      init_args:
        lr: 0.00021
        betas: [0.9, 0.999]
        weight_decay: 0.0001

    scheduler:
      class_path: otx.backend.native.schedulers.LinearWarmupSchedulerCallable
      init_args:
        num_warmup_steps: 0
        main_scheduler_callable:
          class_path: lightning.pytorch.cli.ReduceLROnPlateau
          init_args:
            mode: max
            factor: 0.1
            patience: 10
            monitor: val/map

engine:
  device: auto

callback_monitor: val/f1-score

data: ../_base_/data/torchvision_base.yaml

callbacks:
  - class_path: otx.backend.native.callbacks.adaptive_train_scheduling.AdaptiveTrainScheduling
    init_args:
      max_interval: 1
      min_lrschedule_patience: 5
  - class_path: otx.backend.native.callbacks.adaptive_early_stopping.EarlyStoppingWithWarmup
    init_args:
      mode: max
      patience: 15
      check_on_train_epoch_end: false
      monitor: val/f1-score
      min_delta: 0.001
      warmup_iters: 100
      warmup_epochs: 10
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ""
      monitor: val/f1-score
      mode: max
      save_top_k: 1
      save_last: true
      auto_insert_metric_name: false
      filename: "checkpoints/epoch_{epoch:03d}"
  - class_path: lightning.pytorch.callbacks.EMAWeightAveraging
    init_args:
      decay: 0.993

overrides:
  gradient_clip_val: 0.1
  data:
    input_size:
      - 576
      - 576
    task: DETECTION
    data_format: coco_instances
    train_subset:
      batch_size: 8
      to_tv_image: true
      transforms:
        - class_path: torchvision.transforms.v2.RandomZoomOut
          enable: true
          init_args:
            fill: 0
        - class_path: otx.data.transform_libs.torchvision.RandomIoUCrop
          enable: true
          init_args:
            probability: 1.0
        - class_path: torchvision.transforms.v2.SanitizeBoundingBoxes
          init_args:
            min_size: 1
        - class_path: torchvision.transforms.v2.RandomHorizontalFlip
          enable: true
          init_args:
            p: 0.5
        - class_path: torchvision.transforms.v2.Resize
          init_args:
            size: $(input_size)
        - class_path: torchvision.transforms.v2.ToDtype
          init_args:
            dtype: ${as_torch_dtype:torch.float32}
        - class_path: torchvision.transforms.v2.Normalize
          init_args:
            mean: [123.675, 116.28, 103.53]
            std: [58.395, 57.12, 57.375]
        - class_path: torchvision.transforms.v2.SanitizeBoundingBoxes
      sampler:
        class_path: otx.data.samplers.balanced_sampler.BalancedSampler

    val_subset:
      batch_size: 8
      to_tv_image: true
      transforms:
        - class_path: torchvision.transforms.v2.Resize
          init_args:
            size: $(input_size)
        - class_path: torchvision.transforms.v2.ToDtype
          init_args:
            dtype: ${as_torch_dtype:torch.float32}
        - class_path: torchvision.transforms.v2.Normalize
          init_args:
            mean: [123.675, 116.28, 103.53]
            std: [58.395, 57.12, 57.375]

    test_subset:
      batch_size: 8
      to_tv_image: true
      transforms:
        - class_path: torchvision.transforms.v2.Resize
          init_args:
            size: $(input_size)
        - class_path: torchvision.transforms.v2.ToDtype
          init_args:
            dtype: ${as_torch_dtype:torch.float32}
        - class_path: torchvision.transforms.v2.Normalize
          init_args:
            mean: [123.675, 116.28, 103.53]
            std: [58.395, 57.12, 57.375]
