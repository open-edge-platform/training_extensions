callback_monitor: val/accuracy

data: ../../_base_/data/classification.yaml

overrides:
  reset:
    - data.train_subset.augmentations_cpu
    - data.train_subset.augmentations_gpu
    - data.val_subset.augmentations_cpu
    - data.test_subset.augmentations_cpu

  data:
    task: H_LABEL_CLS
    stack_images: false
    train_subset:
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.ToImage
    val_subset:
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.ToImage
    test_subset:
      batch_size: 128
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.ToImage
