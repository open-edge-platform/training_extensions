task: INSTANCE_SEGMENTATION

model:
  class_path: getitune.backend.lightning.models.instance_segmentation.RFDETRInst
  init_args:
    model_name: rfdetr_seg_2xl
    label_info: 91
    multi_scale: true

    optimizer:
      class_path: torch.optim.AdamW
      init_args:
        lr: 0.0001
        betas: [0.9, 0.999]
        weight_decay: 0.0001

    scheduler:
      class_path: getitune.backend.lightning.schedulers.LinearWarmupSchedulerCallable
      init_args:
        num_warmup_steps: 0
        main_scheduler_callable:
          class_path: lightning.pytorch.cli.ReduceLROnPlateau
          init_args:
            mode: max
            factor: 0.1
            patience: 10
            monitor: val/map_50

engine:
  device: auto
  accumulate_grad_batches: 4

data: ../_base_/data/instance_segmentation.yaml

callback_monitor: val/map_50

callbacks:
  - class_path: getitune.backend.lightning.callbacks.adaptive_train_scheduling.AdaptiveTrainScheduling
    init_args:
      max_interval: 1
      min_lrschedule_patience: 5
  - class_path: getitune.backend.lightning.callbacks.adaptive_early_stopping.EarlyStoppingWithWarmup
    init_args:
      mode: max
      patience: 15
      check_on_train_epoch_end: false
      monitor: val/map_50
      min_delta: 0.001
      warmup_iters: 100
      warmup_epochs: 10
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ""
      monitor: val/map_50
      mode: max
      save_top_k: 1
      save_last: true
      auto_insert_metric_name: false
      filename: "checkpoints/epoch_{epoch:03d}"
  - class_path: lightning.pytorch.callbacks.EMAWeightAveraging
    init_args:
      decay: 0.993

overrides:
  max_epochs: 100
  gradient_clip_val: 0.1
  data:
    task: INSTANCE_SEGMENTATION
    input_size:
      - 768
      - 768
    tile_config:
      enable_tiler: true
      enable_adaptive_tiling: true
    train_subset:
      batch_size: 4
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.RandomZoomOut
          init_args:
            fill: 0
            p: 0.5
        - class_path: getitune.data.augmentation.transforms.RandomIoUCrop
        - class_path: torchvision.transforms.v2.SanitizeBoundingBoxes
          init_args:
            min_size: 1
        - class_path: getitune.data.augmentation.transforms.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: false
      sampler:
        class_path: getitune.data.samplers.balanced_sampler.BalancedSampler

    val_subset:
      batch_size: 4
      augmentations_cpu:
        - class_path: getitune.data.augmentation.transforms.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: false
            resize_targets: false

    test_subset:
      batch_size: 4
      augmentations_cpu:
        - class_path: getitune.data.augmentation.transforms.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: false
            resize_targets: false
