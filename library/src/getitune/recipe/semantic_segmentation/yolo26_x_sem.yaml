backend: ultralytics
task: SEMANTIC_SEGMENTATION

model:
  class_path: getitune.backend.ultralytics.models.semantic_segmentation.UltralyticsSemanticSegModel
  init_args:
    model_name: yolo26x-sem.yaml
    pretrained: true
    imgsz: 512

engine:
  device: auto

training:
  epochs: 100
  batch: 8
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 0.0
  patience: 0

export:
  format: OPENVINO
  precision: FP32

data: ../_base_/data/semantic_segmentation.yaml

overrides:
  data:
    input_size:
      - 512
      - 512
    train_subset:
      batch_size: 8
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.RandomResizedCrop
          init_args:
            size: $(input_size)
            scale:
              - 0.2
              - 1.0
            ratio:
              - 0.5
              - 2.0
        - class_path: torchvision.transforms.v2.RandomHorizontalFlip
          init_args:
            p: 0.5
      augmentations_gpu: []
    val_subset:
      batch_size: 8
      augmentations_cpu:
        - class_path: getitune.data.augmentation.transforms.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: false
            resize_targets: true
      augmentations_gpu: []
    test_subset:
      batch_size: 8
      augmentations_cpu:
        - class_path: getitune.data.augmentation.transforms.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: false
            resize_targets: true
      augmentations_gpu: []
