task: SEMANTIC_SEGMENTATION
model:
  class_path: getitune.backend.lightning.models.segmentation.dino_v2_seg.DinoV2Seg
  init_args:
    label_info: 2
    model_name: dinov2-small-seg

    optimizer:
      class_path: torch.optim.AdamW
      init_args:
        lr: 0.001
        betas:
          - 0.9
          - 0.999
        weight_decay: 0.0001

    scheduler:
      class_path: getitune.backend.lightning.schedulers.LinearWarmupSchedulerCallable
      init_args:
        num_warmup_steps: 0
        main_scheduler_callable:
          class_path: torch.optim.lr_scheduler.PolynomialLR
          init_args:
            total_iters: 150
            power: 0.9
            last_epoch: -1

engine:
  device: auto

callback_monitor: val/Dice

data: ../_base_/data/semantic_segmentation.yaml

callbacks:
  - class_path: getitune.backend.lightning.callbacks.adaptive_early_stopping.EarlyStoppingWithWarmup
    init_args:
      monitor: val/Dice
      min_delta: 0.001
      mode: max
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: "" # use engine.work_dir
      monitor: val/Dice
      mode: max
      save_top_k: 1
      save_last: true
      auto_insert_metric_name: false
      filename: "checkpoints/epoch_{epoch:03d}"

overrides:
  data:
    input_size:
      - 518
      - 518
    train_subset:
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.RandomResizedCrop
          init_args:
            size: $(input_size)
            scale:
              - 0.08
              - 1.0
            ratio:
              - 0.75
              - 1.34
  callbacks:
    - class_path: getitune.backend.lightning.callbacks.adaptive_early_stopping.EarlyStoppingWithWarmup
      init_args:
        warmup_iters: 100
