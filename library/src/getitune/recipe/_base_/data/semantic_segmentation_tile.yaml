task: SEMANTIC_SEGMENTATION
input_size:
  - 512
  - 512
unannotated_items_ratio: 0.0
ignore_index: 255
tile_config:
  enable_tiler: true
  enable_adaptive_tiling: true

train_subset:
  subset_name: train
  batch_size: 8
  num_workers: 4
  augmentations_cpu:
    - class_path: getitune.data.augmentation.transforms.Resize
      init_args:
        size: $(input_size)
        keep_aspect_ratio: false
        resize_targets: true
  augmentations_gpu:
    - class_path: kornia.augmentation.RandomHorizontalFlip
      init_args:
        p: 0.5
    - class_path: kornia.augmentation.ColorJiggle
      enable: true
      init_args:
        brightness: 0.125
        contrast: 0.5
        saturation: 0.5
        hue: 0.05
        p: 0.5
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

val_subset:
  subset_name: val
  batch_size: 8
  num_workers: 4
  augmentations_cpu:
    - class_path: getitune.data.augmentation.transforms.Resize
      init_args:
        size: $(input_size)
        resize_targets: true
  augmentations_gpu:
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null

test_subset:
  subset_name: test
  num_workers: 4
  batch_size: 8
  augmentations_cpu:
    - class_path: getitune.data.augmentation.transforms.Resize
      init_args:
        size: $(input_size)
        resize_targets: true
  augmentations_gpu:
    - class_path: kornia.augmentation.Normalize
      init_args:
        mean:
          - 0.485
          - 0.456
          - 0.406
        std:
          - 0.229
          - 0.224
          - 0.225
  sampler:
    class_path: torch.utils.data.RandomSampler
    init_args: null
