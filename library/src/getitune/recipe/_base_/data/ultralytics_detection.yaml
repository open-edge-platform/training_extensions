task: DETECTION
input_size:
  - 640
  - 640
unannotated_items_ratio: 0.0

train_subset:
  subset_name: train
  batch_size: 16
  num_workers: 8
  augmentations_cpu:
    - class_path: getitune.data.augmentation.transforms.Resize
      init_args:
        size: $(input_size)
        keep_aspect_ratio: false
    - class_path: torchvision.transforms.v2.SanitizeBoundingBoxes
      init_args:
        min_size: 1
  augmentations_gpu:
    - class_path: kornia.augmentation.RandomHorizontalFlip
      init_args:
        p: 0.5
  sampler:
    class_path: getitune.data.samplers.balanced_sampler.BalancedSampler

val_subset:
  subset_name: val
  batch_size: 16
  num_workers: 8
  augmentations_cpu:
    - class_path: getitune.data.augmentation.transforms.Resize
      init_args:
        size: $(input_size)
        keep_aspect_ratio: false
        resize_targets: false
  augmentations_gpu: []
  sampler:
    class_path: torch.utils.data.SequentialSampler

test_subset:
  subset_name: test
  batch_size: 16
  num_workers: 8
  augmentations_cpu:
    - class_path: getitune.data.augmentation.transforms.Resize
      init_args:
        size: $(input_size)
        keep_aspect_ratio: false
        resize_targets: false
  augmentations_gpu: []
  sampler:
    class_path: torch.utils.data.SequentialSampler
