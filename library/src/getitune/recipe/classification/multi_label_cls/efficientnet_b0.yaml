task: MULTI_LABEL_CLS
model:
  class_path: getitune.backend.lightning.models.classification.multilabel_models.efficientnet.EfficientNetMultilabelCls
  init_args:
    label_info: 1000
    model_name: efficientnet_b0

    optimizer:
      class_path: torch.optim.SGD
      init_args:
        lr: 0.0049
        momentum: 0.9
        weight_decay: 0.0005

    scheduler:
      class_path: getitune.backend.lightning.schedulers.LinearWarmupSchedulerCallable
      init_args:
        num_warmup_steps: 0
        main_scheduler_callable:
          class_path: lightning.pytorch.cli.ReduceLROnPlateau
          init_args:
            mode: max
            factor: 0.5
            patience: 3
            monitor: val/accuracy

engine:
  device: auto

callback_monitor: val/accuracy

data: ../../_base_/data/classification.yaml

callbacks:
  - class_path: getitune.backend.lightning.callbacks.adaptive_early_stopping.EarlyStoppingWithWarmup
    init_args:
      patience: 5
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: "" # use engine.work_dir
      monitor: val/accuracy
      mode: max
      save_top_k: 1
      save_last: true
      auto_insert_metric_name: false
      filename: "checkpoints/epoch_{epoch:03d}"

overrides:
  reset:
    - data.train_subset.augmentations_cpu
    - data.train_subset.augmentations_gpu

  max_epochs: 200
  data:
    task: MULTI_LABEL_CLS
    train_subset:
      # CPU-stage: Size-dependent transforms only
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.RandomResizedCrop
          init_args:
            size: $(input_size)
            scale:
              - 0.08
              - 1.0
            ratio:
              - 0.75
              - 1.34
      # GPU-stage: Pixel-level augmentations (Kornia)
      augmentations_gpu:
        - class_path: kornia.augmentation.RandomHorizontalFlip
          init_args:
            p: 0.5
        - class_path: kornia.augmentation.Normalize
          init_args:
            mean:
              - 0.485
              - 0.456
              - 0.406
            std:
              - 0.229
              - 0.224
              - 0.225
