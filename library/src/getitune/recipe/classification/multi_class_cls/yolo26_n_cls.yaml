backend: ultralytics
task: MULTI_CLASS_CLS

model:
  class_path: getitune.backend.ultralytics.models.classification.UltralyticsMultiClassClsModel
  init_args:
    model_name: yolo26n-cls.yaml
    pretrained: true
    imgsz: 224

engine:
  device: auto

training:
  epochs: 90
  batch: 64
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 0.0
  patience: 0

export:
  format: OPENVINO
  precision: FP32

data: ../../_base_/data/classification.yaml

overrides:
  data:
    input_size:
      - 224
      - 224
    train_subset:
      batch_size: 64
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.RandomResizedCrop
          init_args:
            size: $(input_size)
            scale:
              - 0.08
              - 1.0
            ratio:
              - 0.75
              - 1.34
        - class_path: torchvision.transforms.v2.RandomHorizontalFlip
          init_args:
            p: 0.5
        - class_path: torchvision.transforms.v2.ColorJitter
          init_args:
            brightness: 0.2
            contrast: 0.2
            saturation: 0.2
            hue: 0.05
      augmentations_gpu: []
      sampler:
        class_path: getitune.data.samplers.balanced_sampler.BalancedSampler
    val_subset:
      batch_size: 64
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.Resize
          init_args:
            size: $(input_size)
      augmentations_gpu: []
      sampler:
        class_path: torch.utils.data.SequentialSampler
    test_subset:
      batch_size: 64
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.Resize
          init_args:
            size: $(input_size)
      augmentations_gpu: []
      sampler:
        class_path: torch.utils.data.SequentialSampler
