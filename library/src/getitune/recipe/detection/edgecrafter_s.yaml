task: DETECTION
model:
  class_path: getitune.backend.lightning.models.detection.EdgeCrafter
  init_args:
    model_name: edgecrafter_s
    label_info: 80
    multi_scale: false

    optimizer:
      class_path: torch.optim.AdamW
      init_args:
        lr: 0.0004
        betas: [0.9, 0.999]
        weight_decay: 0.0001

    scheduler:
      class_path: getitune.backend.lightning.schedulers.LinearWarmupSchedulerCallable
      init_args:
        num_warmup_steps: 30
        main_scheduler_callable:
          class_path: lightning.pytorch.cli.ReduceLROnPlateau
          init_args:
            mode: max
            factor: 0.5
            patience: 10
            monitor: val/map_50

engine:
  device: auto

callback_monitor: val/map_50

callbacks:
  - class_path: getitune.backend.lightning.callbacks.adaptive_train_scheduling.AdaptiveTrainScheduling
    init_args:
      max_interval: 1
      min_lrschedule_patience: 3
  - class_path: getitune.backend.lightning.callbacks.adaptive_early_stopping.EarlyStoppingWithWarmup
    init_args:
      mode: max
      patience: 10
      min_delta: 0.001
      warmup_iters: 50
      warmup_epochs: 10
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ""
      monitor: val/map_50
      mode: max
      save_top_k: 1
      save_last: true
      auto_insert_metric_name: false
      filename: "checkpoints/epoch_{epoch:03d}"

data: ../_base_/data/detection.yaml
overrides:
  callbacks:
    - class_path: getitune.backend.lightning.callbacks.adaptive_train_scheduling.AdaptiveTrainScheduling
      init_args:
        max_interval: 1
        min_lrschedule_patience: 3
    - class_path: getitune.backend.lightning.callbacks.adaptive_early_stopping.EarlyStoppingWithWarmup
      init_args:
        warmup_iters: 100
        warmup_epochs: 7

  data:
    input_size:
      - 512
      - 512
    task: DETECTION
    train_subset:
      batch_size: 8
      augmentations_cpu:
        - class_path: torchvision.transforms.v2.RandomZoomOut
          init_args:
            fill: 0
            p: 0.5
        - class_path: getitune.data.augmentation.transforms.RandomIoUCrop
        - class_path: torchvision.transforms.v2.SanitizeBoundingBoxes
          init_args:
            min_size: 1
        - class_path: getitune.data.augmentation.transforms.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: false
      augmentations_gpu:
        - class_path: kornia.augmentation.RandomHorizontalFlip
          init_args:
            p: 0.5
        - class_path: kornia.augmentation.Normalize
          init_args:
            mean: [0.485, 0.456, 0.406]
            std: [0.229, 0.224, 0.225]
      sampler:
        class_path: getitune.data.samplers.balanced_sampler.BalancedSampler

    val_subset:
      batch_size: 8
      augmentations_cpu:
        - class_path: getitune.data.augmentation.transforms.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: false
            resize_targets: false
      augmentations_gpu:
        - class_path: kornia.augmentation.Normalize
          init_args:
            mean: [0.485, 0.456, 0.406]
            std: [0.229, 0.224, 0.225]
    test_subset:
      batch_size: 8
      augmentations_cpu:
        - class_path: getitune.data.augmentation.transforms.Resize
          init_args:
            size: $(input_size)
            keep_aspect_ratio: false
            resize_targets: false
      augmentations_gpu:
        - class_path: kornia.augmentation.Normalize
          init_args:
            mean: [0.485, 0.456, 0.406]
            std: [0.229, 0.224, 0.225]
