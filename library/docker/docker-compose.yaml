# MLflow Tracking Server for OTX Benchmark
#
# Deploys a centralized MLflow server backed by PostgreSQL, so that all
# benchmark runs (CI and local) share a single source of truth for
# experiment history and baseline resolution.
#
# Usage:
#   echo "MLFLOW_DB_PASSWORD=changeme" > .env
#   docker compose up -d
#   # MLflow UI → http://localhost:5000
#
# Stop:
#   docker compose down
#
# Stop and delete all data (DANGER):
#   docker compose down -v
#
# To point the benchmark runner at this server:
#   python -m otx.benchmark run --mlflow-uri http://<host>:5000 ...
#
# In CI, set the GitHub Actions secret MLFLOW_TRACKING_URI accordingly.

services:
  # ── PostgreSQL backend store ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: "${MLFLOW_DB_PASSWORD:?Set MLFLOW_DB_PASSWORD in .env or environment}"
      POSTGRES_DB: mlflow
    volumes:
      - mlflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Not exposed externally — only accessible from the mlflow service.

  # ── MLflow Tracking Server ─────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1-full
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: "postgresql://mlflow:${MLFLOW_DB_PASSWORD}@db:5432/mlflow"
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri "postgresql://mlflow:${MLFLOW_DB_PASSWORD}@db:5432/mlflow"
        --default-artifact-root /mlflow/artifacts
        --workers 2
        --allowed-hosts "*"
        --cors-allowed-origins "*"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mlflow-db-data:
    driver: local
  mlflow-artifacts:
    driver: local
