id: image-classification-mobilenet-v3-large
name: MobileNet-V3-Large

pretrained_weights:
  url: https://storage.geti.intel.com/weights/mobilenetv3-large-1cd25616.pth
  mirror_url: https://raw.githubusercontent.com/d-li14/mobilenetv3.pytorch/master/pretrained/mobilenetv3-large-1cd25616.pth
  sha_sum: 1cd25616db4b6481677fcbe5f6932520894cb34860ed86f7080f03eedf937b11

description: "MobileNetV3-Large is a lightweight and efficient image classification model tailored for high-performance applications on mobile and embedded devices. It combines MobileNetV2’s inverted residuals with enhancements like squeeze-and-excitation (SE) blocks, hard-swish activation, and neural architecture search for optimal speed-accuracy trade-offs."
stats:
  gigaflops: 0.44
  trainable_parameters: 5.4
  benchmark_metrics:
    imagenet_top1_accuracy: 75.2
    imagenet_top5_accuracy: 91.3

hyperparameters:
  training:
    learning_rate: 0.0058
    weight_decay: 0.0001
    scheduler:
      warmup:
        enable: true
        epochs: 10
