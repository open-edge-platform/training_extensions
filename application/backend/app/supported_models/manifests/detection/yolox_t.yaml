id: object-detection-yolox-tiny
name: YOLOX-Tiny

pretrained_weights:
  url: https://storage.geti.intel.com/weights/yolox_tiny_8x8.pth
  mirror_url: https://storage.openvinotoolkit.org/repositories/openvino_training_extensions/models/object_detection/v2/yolox_tiny_8x8.pth
  sha_sum: 4ff3b67e005a6356a5794f5fbc42b133e077aa30ddcb0449b2153cfd953a0030

description: "YOLOX is a high-performance, anchor-free object detection algorithm that builds on the YOLO series with modern improvements. It features a decoupled head for separate classification and regression tasks, strong data augmentation techniques, and advanced label assignment strategies. YOLOX achieves a great balance between speed and accuracy, making it suitable for real-time applications across various domains."
stats:
  gigaflops: 6.45
  trainable_parameters: 5.06
  benchmark_metrics:
    coco_map_50_95: 32.8

hyperparameters:
  training:
    learning_rate: 0.0002
    weight_decay: 0.0001
    scheduler:
      factor: 0.1
      patience: 4
    gradient_clip:
      enable: true
      max_grad_norm: 35.0
    allowed_values_input_size:
      - 128
      - 256
      - 416
      - 512
      - 640
      - 800
      - 992
      - 1024
    input_size_width: 416
    input_size_height: 416
  dataset_preparation:
    augmentation:
      mosaic:
        enable: true
      mixup:
        enable: false
        probability: 0.5
        alpha: 1.5
      iou_random_crop:
        enable: false
        probability: 1.0
        min_scale: 0.3
        max_scale: 1.0
      random_horizontal_flip:
        enable: true
        probability: 0.5
      random_vertical_flip:
        enable: false
        probability: 0.5
      random_affine:
        enable: true
        max_rotate_degree: 10.0
        max_translate_ratio: 0.1
        scaling_ratio_range:
          - 1.0
          - 1.0
        max_shear_degree: 2.0
        probability: 0.7
      gaussian_blur:
        enable: false
        kernel_size: 5
        sigma:
          - 0.1
          - 2.0
        probability: 0.5
      color_jitter:
        enable: false
        brightness:
          - 0.875
          - 1.125
        contrast:
          - 0.5
          - 1.5
        saturation:
          - 0.5
          - 1.5
        hue:
          - -0.05
          - 0.05
        probability: 0.5
      gaussian_noise:
        enable: false
        mean: 0.0
        sigma: 0.1
        probability: 0.5
      random_erasing:
        enable: false
        scale:
          - 0.02
          - 0.33
        ratio:
          - 0.3
          - 3.3
        probability: 0.5
        value: 0.0
      random_grayscale:
        enable: false
        probability: 0.1
      random_sharpness:
        enable: false
        sharpness: 0.5
        probability: 0.5

memory_footprint:
  reference_batch_size: 8
  estimated_training_memory_mb: 1232.0
  base_memory_mb: 1101.2
  per_sample_memory_mb: 16.351
