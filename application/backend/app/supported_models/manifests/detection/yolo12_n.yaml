id: object-detection-yolo12-n
name: YOLO12-N
license: AGPL-3.0

pretrained_weights:
  url: https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo12n.pt
  mirror_url: ""
  sha_sum: "419ff3dca37d69bacc93a50fa0c186a1c6f9fe62fae0f108b0872829689e9ca6"

description: "YOLO12-N is the nano Ultralytics YOLO12 detection model. It is optimized for fast fine-tuning and low-latency inference while using the Geti Tune data pipeline for preprocessing and dataset handling."
stats:
  gigaflops: 6.5
  trainable_parameters: 2.6
  benchmark_metrics:
    coco_map_50_95: 40.6

capabilities:
  tiling: false
  xai: false

hyperparameters:
  training:
    learning_rate: 0.001
    weight_decay: 0.0005
    max_epochs: 100
    early_stopping:
      enable: false
    batch_size: 16
    input_size_width: 640
    input_size_height: 640
    allowed_values_input_size:
      - 640
    scheduler:
      type: cosine_annealing
      warmup:
        enable: false
    gradient_clip:
      enable: true
      max_grad_norm: 10.0
    gradient_accumulation:
      enable: false
  dataset_preparation:
    augmentation:
      mosaic:
        enable: true
        probability: 1.0
        scale: 0.5
        translate: 0.1
      mixup:
        enable: false
        probability: 0.5
        alpha: 1.5
      iou_random_crop:
        enable: false
      color_jitter:
        enable: true
        brightness:
          - 0.6
          - 1.4
        contrast:
          - 0.6
          - 1.4
        saturation:
          - 0.3
          - 1.7
        hue:
          - -0.015
          - 0.015
        probability: 1.0
      random_horizontal_flip:
        enable: true
        probability: 0.5
