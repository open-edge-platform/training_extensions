task: detection
capabilities:
  tiling: true # by default, all detection models support tiling (unless specified otherwise)

hyperparameters:
  dataset_preparation:
    augmentation:
      deim_framework: null
      random_zoom_out:
        enable: false
        fill: 0
        side_range:
          - 1.0
          - 4.0
        probability: 0.5
      tiling:
        enable: false
        enable_adaptive_tiling: true
        tile_size: 400
        tile_overlap: 0.2
      iou_random_crop:
        enable: true
        probability: 1.0
        min_scale: 0.3
        max_scale: 1.0
      random_horizontal_flip:
        enable: true
        probability: 0.5
      random_vertical_flip:
        enable: false
        probability: 0.5
      random_affine:
        enable: false
        max_rotate_degree: 10.0
        max_translate_ratio: 0.1
        scaling_ratio_range:
          - 0.5
          - 1.5
        max_shear_degree: 2.0
        probability: 0.5
      gaussian_blur:
        enable: false
        kernel_size: 5
        sigma:
          - 0.1
          - 2.0
        probability: 0.5
      color_jitter:
        enable: false
        brightness:
          - 0.875
          - 1.125
        contrast:
          - 0.5
          - 1.5
        saturation:
          - 0.5
          - 1.5
        hue:
          - -0.05
          - 0.05
        probability: 0.5
      gaussian_noise:
        enable: false
        mean: 0.0
        sigma: 0.1
        probability: 0.5
      random_erasing:
        enable: false
        scale:
          - 0.02
          - 0.33
        ratio:
          - 0.3
          - 3.3
        probability: 0.5
        value: 0.0
      random_grayscale:
        enable: false
        probability: 0.1
      random_sharpness:
        enable: false
        sharpness: 0.5
        probability: 0.5
  evaluation:
    metric: f_measure
  training:
    batch_size: 8
    early_stopping:
      enable: true
      patience: 10
    scheduler:
      type: reduce_lr_on_plateau
      warmup:
        enable: false
    gradient_clip:
      enable: false
    gradient_accumulation:
      enable: false
    allowed_values_input_size:
      - 128
      - 256
      - 384
      - 512
      - 640
      - 800
      - 992
      - 1024
    input_size_width: 992
    input_size_height: 800
