id: object-detection-d-fine-x
name: D-FINE-X

pretrained_weights:
  url: https://github.com/Peterande/storage/releases/download/dfinev1.0/dfine_x_coco.pth
  sha_sum: 9a82252f2d0426b2c24e99905c36c33a4ea850f247c247bda76fb5f76daea123

description: "D-FINE is a powerful real-time object detector that redefines the bounding box regression task in DETRs as Fine-grained Distribution Refinement (FDR) and introduces Global Optimal Localization Self-Distillation (GO-LSD), achieving outstanding performance without introducing additional inference and training costs."
stats:
  gigaflops: 202
  trainable_parameters: 240
  benchmark_metrics:
    coco_map_50_95: 55.8 # mAP at IoU=0.50:0.95
    coco_map_50: 73.7 # mAP at IoU=0.50 (optional)

hyperparameters:
  training:
    learning_rate: 0.00025
    input_size_width: 640
    input_size_height: 640
  dataset_preparation:
    augmentation:
      random_zoom_out:
        enable: true
        fill: 0
      iou_random_crop:
        enable: true
      random_affine:
        enable: false
        max_rotate_degree: 10.0
        max_translate_ratio: 0.1
        scaling_ratio_range:
          - 0.5
          - 1.5
        max_shear_degree: 2.0
      random_horizontal_flip:
        enable: true
        probability: 0.5
      random_vertical_flip:
        enable: false
        probability: 0.5
      gaussian_blur:
        enable: false
        kernel_size: 5
        sigma:
          - 0.1
          - 2.0
        probability: 0.5
      color_jitter:
        enable: true
        brightness:
          - 0.875
          - 1.125
        contrast:
          - 0.5
          - 1.5
        saturation:
          - 0.5
          - 1.5
        hue:
          - -0.05
          - 0.05
        probability: 0.5
      gaussian_noise:
        enable: false
        mean: 0.0
        sigma: 0.1
        probability: 0.5
