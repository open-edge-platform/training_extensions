id: object-detection-yolo26-m
name: YOLO26-M

pretrained_weights:
  url: https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo26m.pt
  mirror_url: https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo26m.pt
  sha_sum: 401cea9ab23ad19246ff7744859816bc599f350e93c9dd30367b6f0a0745d0b7

description: "YOLO26-M is the medium Ultralytics YOLO26 detection model. It targets higher accuracy while using the Geti Tune data pipeline for preprocessing and dataset handling."
stats:
  gigaflops: 68.2
  trainable_parameters: 20.4
  benchmark_metrics:
    coco_map_50_95: 53.1

capabilities:
  tiling: false

hyperparameters:
  training:
    learning_rate: 0.01
    weight_decay: 0.0005
    batch_size: 8
    input_size_width: 640
    input_size_height: 640
    allowed_values_input_size:
      - 640
  dataset_preparation:
    augmentation:
      tiling:
        enable: false
      random_horizontal_flip:
        enable: true
        probability: 0.5
      iou_random_crop:
        enable: true
