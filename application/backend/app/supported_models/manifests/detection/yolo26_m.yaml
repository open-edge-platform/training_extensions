id: object-detection-yolo26-m
name: YOLO26-M
license: AGPL-3.0

pretrained_weights:
  url: https://storage.geti.intel.com/weights/yolo26m.pt
  mirror_url: https://storage.geti.intel.com/weights/yolo26m.pt
  sha_sum: 401cea9ab23ad19246ff7744859816bc599f350e93c9dd30367b6f0a0745d0b7

description: "YOLO26-M is the medium Ultralytics YOLO26 detection model. It targets higher accuracy while using the Geti Tune data pipeline for preprocessing and dataset handling."
stats:
  gigaflops: 68.2
  trainable_parameters: 20.4
  benchmark_metrics:
    coco_map_50_95: 53.1

capabilities:
  tiling: false
  xai: false

hyperparameters:
  training:
    learning_rate: 0.001
    weight_decay: 0.0005
    max_epochs: 80
    early_stopping:
      enable: false
    batch_size: 8
    input_size_width: 640
    input_size_height: 640
    allowed_values_input_size:
      - 640
    scheduler:
      type: cosine_annealing
      warmup:
        enable: false
    gradient_clip:
      enable: true
      max_grad_norm: 10.0
    gradient_accumulation:
      enable: false
  dataset_preparation:
    augmentation:
      mosaic:
        enable: true
        probability: 1.0
        scale: 0.5
        translate: 0.1
      mixup:
        enable: false
        probability: 0.5
        alpha: 1.5
      iou_random_crop:
        enable: false
      color_jitter:
        enable: true
        brightness:
          - 0.6
          - 1.4
        contrast:
          - 0.6
          - 1.4
        saturation:
          - 0.3
          - 1.7
        hue:
          - -0.015
          - 0.015
        probability: 1.0
      random_horizontal_flip:
        enable: true
        probability: 0.5
