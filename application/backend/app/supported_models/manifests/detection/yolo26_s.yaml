id: object-detection-yolo26-s
name: YOLO26-S
license: AGPL-3.0

pretrained_weights:
  url: https://storage.geti.intel.com/weights/yolo26s.pt
  mirror_url: https://storage.geti.intel.com/weights/yolo26s.pt
  sha_sum: 646f8bc3fe0a656803d95c294f7852321748cb29d13466a1af8862e2db384a1b

description: "YOLO26-S is the small Ultralytics YOLO26 detection model. It provides a balanced accuracy/latency profile while using the Geti Tune data pipeline for preprocessing and dataset handling."
stats:
  gigaflops: 20.7
  trainable_parameters: 9.5
  benchmark_metrics:
    coco_map_50_95: 48.6

capabilities:
  tiling: false
  xai: false

hyperparameters:
  training:
    learning_rate: 0.001
    weight_decay: 0.0005
    max_epochs: 100
    early_stopping:
      enable: false
    batch_size: 16
    input_size_width: 640
    input_size_height: 640
    allowed_values_input_size:
      - 640
    scheduler:
      type: cosine_annealing
      warmup:
        enable: false
    gradient_clip:
      enable: true
      max_grad_norm: 10.0
    gradient_accumulation:
      enable: false
  dataset_preparation:
    augmentation:
      mosaic:
        enable: true
        probability: 1.0
        scale: 0.5
        translate: 0.1
      mixup:
        enable: false
        probability: 0.5
        alpha: 1.5
      iou_random_crop:
        enable: false
      color_jitter:
        enable: true
        brightness:
          - 0.6
          - 1.4
        contrast:
          - 0.6
          - 1.4
        saturation:
          - 0.3
          - 1.7
        hue:
          - -0.015
          - 0.015
        probability: 1.0
      random_horizontal_flip:
        enable: true
        probability: 0.5
