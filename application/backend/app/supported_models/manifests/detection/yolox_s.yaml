id: object-detection-yolox-s
name: YOLOX-S

pretrained_weights:
  url: https://storage.geti.intel.com/weights/yolox_s_8x8_300e_coco_20211121_095711-4592a793.pth
  mirror_url: https://download.openmmlab.com/mmdetection/v2.0/yolox/yolox_s_8x8_300e_coco/yolox_s_8x8_300e_coco_20211121_095711-4592a793.pth
  sha_sum: 4592a793b95f18f62fd73fbb6cfe61dd445f71a8e072366e114e7134d4492760

description: "YOLOX is a high-performance, anchor-free object detection algorithm that builds on the YOLO series with modern improvements. It features a decoupled head for separate classification and regression tasks, strong data augmentation techniques, and advanced label assignment strategies. YOLOX achieves a great balance between speed and accuracy, making it suitable for real-time applications across various domains."
stats:
  gigaflops: 26.8
  trainable_parameters: 9.0
  benchmark_metrics:
    coco_map_50_95: 40.5

hyperparameters:
  dataset_preparation:
    augmentation:
      mosaic:
        enable: true
      mixup:
        enable: true
        probability: 0.5
        alpha: 1.5
      iou_random_crop:
        enable: false
        probability: 1.0
        min_scale: 0.3
        max_scale: 1.0
      color_jitter:
        enable: true
        brightness:
          - 0.875
          - 1.125
        contrast:
          - 0.5
          - 1.5
        saturation:
          - 0.5
          - 1.5
        hue:
          - -0.05
          - 0.05
        probability: 0.5
      random_horizontal_flip:
        enable: true
        probability: 0.5
      random_vertical_flip:
        enable: false
        probability: 0.5
      random_affine:
        enable: true
        max_rotate_degree: 10.0
        max_translate_ratio: 0.1
        scaling_ratio_range:
          - 1.0
          - 1.0
        max_shear_degree: 2.0
        probability: 0.7
      gaussian_blur:
        enable: false
        kernel_size: 5
        sigma:
          - 0.1
          - 2.0
        probability: 0.5
      gaussian_noise:
        enable: false
        mean: 0.0
        sigma: 0.1
        probability: 0.5
      random_erasing:
        enable: false
        scale:
          - 0.02
          - 0.33
        ratio:
          - 0.3
          - 3.3
        probability: 0.5
        value: 0.0
      random_grayscale:
        enable: false
        probability: 0.1
      random_sharpness:
        enable: false
        sharpness: 0.5
        probability: 0.5
  training:
    learning_rate: 0.001
    weight_decay: 0.0001
    scheduler:
      factor: 0.1
      patience: 4
    gradient_clip:
      enable: true
      max_grad_norm: 35.0
    input_size_width: 640
    input_size_height: 640

memory_footprint:
  reference_batch_size: 8
  estimated_training_memory_mb: 2447.7
  base_memory_mb: 1161.3
  per_sample_memory_mb: 160.8
