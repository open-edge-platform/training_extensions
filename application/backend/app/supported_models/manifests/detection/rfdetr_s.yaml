id: object-detection-rfdetr-s
name: RF-DETR-S

pretrained_weights:
  url: https://storage.geti.intel.com/weights/rf-detr-small-2026.pth
  mirror_url: https://storage.googleapis.com/rfdetr/small_coco/checkpoint_best_regular.pth
  sha_sum: d81979a9213a2109345158ce9232668df4c1ae52e9b8db3f2ec0a8cbad959b33

description: "RF-DETR is a real-time object detection model that combines a DINOv2 vision transformer backbone with a novel decoder for high-accuracy detection without NMS post-processing."
stats:
  gigaflops: 51.0
  trainable_parameters: 32.1
  benchmark_metrics:
    coco_map_50_95: 53.0
    coco_map_50: 72.1

capabilities:
  tiling: false

hyperparameters:
  training:
    learning_rate: 0.00021
    weight_decay: 0.0001
    early_stopping:
      patience: 15
    scheduler:
      factor: 0.1
      patience: 10
    gradient_clip:
      enable: true
      max_grad_norm: 0.1
    allowed_values_input_size:
      - 320
      - 448
      - 512
      - 576
      - 640
      - 704
      - 768
      - 896
    input_size_width: 512
    input_size_height: 512
  dataset_preparation:
    augmentation:
      random_zoom_out:
        enable: true
        fill: 0
        side_range:
          - 1.0
          - 4.0
        probability: 0.5
