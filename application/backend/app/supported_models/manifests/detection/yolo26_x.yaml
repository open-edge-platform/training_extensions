id: object-detection-yolo26-x
name: YOLO26-X
license: AGPL-3.0

pretrained_weights:
  url: https://huggingface.co/Ultralytics/YOLO26/resolve/main/yolo26x.pt
  mirror_url: https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo26x.pt
  sha_sum: "9fdd44a31c504547ffb81d2c6d9e6dac3493c8eaa8b0398d3f43bae6c7003e92"

description: "YOLO26-X is the extra-large Ultralytics YOLO26 detection model. It targets maximum accuracy while using the Geti Tune data pipeline for preprocessing and dataset handling."
stats:
  gigaflops: 193.9
  trainable_parameters: 55.7
  benchmark_metrics:
    coco_map_50_95: 57.5

capabilities:
  tiling: false
  xai: false

hyperparameters:
  training:
    learning_rate: 0.001
    weight_decay: 0.0005
    max_epochs: 100
    early_stopping:
      enable: false
    batch_size: 4
    input_size_width: 640
    input_size_height: 640
    allowed_values_input_size:
      - 640
    scheduler:
      type: cosine_annealing
      warmup:
        enable: false
    gradient_clip:
      enable: true
      max_grad_norm: 10.0
    gradient_accumulation:
      enable: false
  dataset_preparation:
    augmentation:
      mosaic:
        enable: true
        probability: 1.0
        scale: 0.5
        translate: 0.1
      mixup:
        enable: false
        probability: 0.5
        alpha: 1.5
      iou_random_crop:
        enable: false
      color_jitter:
        enable: true
        brightness:
          - 0.6
          - 1.4
        contrast:
          - 0.6
          - 1.4
        saturation:
          - 0.3
          - 1.7
        hue:
          - -0.015
          - 0.015
        probability: 1.0
      random_horizontal_flip:
        enable: true
        probability: 0.5
