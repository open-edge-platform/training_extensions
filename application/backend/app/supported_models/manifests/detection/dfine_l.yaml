id: object-detection-dfine-l
name: D-FINE-L

pretrained_weights:
  url: https://storage.geti.intel.com/weights/deim_dfine_hgnetv2_l_coco_50e.pth
  mirror_url: https://github.com/eugene123tw/DEIM/releases/download/poc/deim_dfine_hgnetv2_l_coco_50e.pth
  sha_sum: a9ac1f9bf51a41a7ec02c373c85e0109f84908dde11d80759b43248dcb638baa

description: "D-FINE is a powerful real-time object detector that redefines the bounding box regression task in DETRs as Fine-grained Distribution Refinement (FDR). Combined with the DEIM adaptive augmentation scheduling framework (enabled by default), it achieves outstanding performance with faster convergence."
stats:
  gigaflops: 91
  trainable_parameters: 31
  benchmark_metrics:
    coco_map_50_95: 54.7
    coco_map_50: 72.4

capabilities:
  tiling: false

hyperparameters:
  training:
    learning_rate: 0.0005
    weight_decay: 0.000125
    scheduler:
      factor: 0.5
      patience: 10
      warmup:
        enable: true
        epochs: 30
    allowed_values_input_size:
      - 640
    input_size_width: 640
    input_size_height: 640
  dataset_preparation:
    augmentation:
      deim_framework: true
      random_zoom_out:
        enable: true

memory_footprint:
  reference_batch_size: 8
  estimated_training_memory_mb: 5865.0
  base_memory_mb: 1497.0
  per_sample_memory_mb: 546.0
