task: instance_segmentation
capabilities:
  tiling: true

hyperparameters:
  dataset_preparation:
    augmentation:
      tiling:
        enable: false
        enable_adaptive_tiling: true
        tile_size: 400
        tile_overlap: 0.2
      random_horizontal_flip:
        enable: true
        probability: 0.5
      random_affine:
        enable: false
        max_rotate_degree: 10.0
        max_translate_ratio: 0.1
        scaling_ratio_range:
          - 0.5
          - 1.5
        max_shear_degree: 2.0
      random_vertical_flip:
        enable: false
        probability: 0.5
      gaussian_blur:
        enable: false
        kernel_size: 5
        sigma:
          - 0.1
          - 2.0
        probability: 0.5
      color_jitter:
        enable: false
        brightness:
          - 0.875
          - 1.125
        contrast:
          - 0.5
          - 1.5
        saturation:
          - 0.5
          - 1.5
        hue:
          - -0.05
          - 0.05
        probability: 0.5
      gaussian_noise:
        enable: false
        mean: 0.0
        sigma: 0.1
        probability: 0.5
      random_erasing:
        enable: false
        scale:
          - 0.02
          - 0.33
        ratio:
          - 0.3
          - 3.3
        probability: 0.5
      random_grayscale:
        enable: false
        probability: 0.1
      random_sharpness:
        enable: false
        sharpness: 0.5
        probability: 0.5
  evaluation:
    metric: dice
  training:
    batch_size: 4
    early_stopping:
      enable: true
      patience: 10
    scheduler:
      type: reduce_lr_on_plateau
      warmup:
        enable: false
    gradient_clip:
      enable: false
    gradient_accumulation:
      enable: false
    allowed_values_input_size:
      - 512
      - 640
      - 800
      - 992
      - 1024
      - 1280
      - 1344
      - 1536
    input_size_width: 1024
    input_size_height: 1024
