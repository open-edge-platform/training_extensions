id: instance-segmentation-yolo26-s
name: YOLO26-S-Seg

pretrained_weights:
  url: https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo26s-seg.pt
  mirror_url: https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo26s-seg.pt
  sha_sum: ""

description: "YOLO26-S-Seg is the small Ultralytics YOLO26 instance segmentation model. It provides a balanced accuracy/latency profile while using the Geti Tune data pipeline for preprocessing and dataset handling."
stats:
  gigaflops: 34.2
  trainable_parameters: 10.4
  benchmark_metrics:
    coco_map_50_95: 40.0

capabilities:
  tiling: false

hyperparameters:
  training:
    learning_rate: 0.01
    weight_decay: 0.0005
    batch_size: 16
    input_size_width: 640
    input_size_height: 640
    allowed_values_input_size:
      - 640
  dataset_preparation:
    augmentation:
      tiling:
        enable: false
      random_horizontal_flip:
        enable: true
        probability: 0.5
      iou_random_crop:
        enable: true
