id: instance-segmentation-yolo26-s
name: YOLO26-S-Seg
license: AGPL-3.0

pretrained_weights:
  url: https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo26s-seg.pt
  mirror_url: https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo26s-seg.pt
  sha_sum: "3da1d83e31caec96f9300eb4064f4f62882c133c7c264d63dfe61a7c197837a4"

description: "YOLO26-S-Seg is the small Ultralytics YOLO26 instance segmentation model. It provides a balanced accuracy/latency profile while using the Geti Tune data pipeline for preprocessing and dataset handling."
stats:
  gigaflops: 34.2
  trainable_parameters: 10.4
  benchmark_metrics:
    coco_map_50_95: 40.0

capabilities:
  tiling: false
  xai: false

hyperparameters:
  training:
    learning_rate: 0.01
    weight_decay: 0.0005
    batch_size: 16
    input_size_width: 640
    input_size_height: 640
    allowed_values_input_size:
      - 640
  dataset_preparation:
    augmentation:
      mosaic:
        enable: false
        probability: 1.0
        scale: 0.5
        translate: 0.1
      mixup:
        enable: false
        probability: 0.5
        alpha: 1.5
      color_jitter:
        enable: false
        brightness:
          - 0.6
          - 1.4
        contrast:
          - 0.6
          - 1.4
        saturation:
          - 0.3
          - 1.7
        hue:
          - -0.015
          - 0.015
        probability: 1.0
      random_horizontal_flip:
        enable: true
        probability: 0.5
