id: instance-segmentation-rtmdet-tiny
name: RTMDet-Tiny

pretrained_weights:
  url: https://storage.geti.intel.com/weights/rtmdet-ins_tiny_8xb32-300e_coco_20221130_151727-ec670f7e.pth
  mirror_url: https://download.openmmlab.com/mmdetection/v3.0/rtmdet/rtmdet-ins_tiny_8xb32-300e_coco/rtmdet-ins_tiny_8xb32-300e_coco_20221130_151727-ec670f7e.pth
  sha_sum: ec670f7ee9e20bd7931e15f15b7016f7fe531baaab81f2e6153382d046111885

description: "RTMDet for instance segmentation extends the real-time object detection framework with mask prediction capabilities. It features a unified, anchor-free architecture with a decoupled head and task-specific neck, enabling high-performance instance segmentation with real-time inference speed."
stats:
  gigaflops: 11.8
  trainable_parameters: 5.6
  benchmark_metrics:
    coco_map_50_95: 35.4

hyperparameters:
  dataset_preparation:
    augmentation:
      mosaic:
        enable: true
      mixup:
        enable: true
        probability: 0.5
      random_horizontal_flip:
        enable: true
        probability: 0.5
      color_jitter:
        enable: true
        brightness:
          - 0.875
          - 1.125
        contrast:
          - 0.5
          - 1.5
        saturation:
          - 0.5
          - 1.5
        hue:
          - -0.05
          - 0.05
        probability: 0.5
      random_vertical_flip:
        enable: false
        probability: 0.5
      random_affine:
        enable: false
        max_rotate_degree: 10.0
        max_translate_ratio: 0.1
        scaling_ratio_range:
          - 0.5
          - 1.5
        max_shear_degree: 2.0
        probability: 0.5
      gaussian_blur:
        enable: false
        kernel_size: 5
        sigma:
          - 0.1
          - 2.0
        probability: 0.5
      gaussian_noise:
        enable: false
        mean: 0.0
        sigma: 0.1
        probability: 0.5
      random_erasing:
        enable: false
        scale:
          - 0.02
          - 0.33
        ratio:
          - 0.3
          - 3.3
        probability: 0.5
        value: 0.0
      random_grayscale:
        enable: false
        probability: 0.1
      random_sharpness:
        enable: false
        sharpness: 0.5
        probability: 0.5
  training:
    learning_rate: 0.004
    weight_decay: 0.01
    scheduler:
      factor: 0.1
      patience: 9
      warmup:
        enable: true
        epochs: 20
    gradient_clip:
      enable: true
      max_grad_norm: 35.0
    input_size_width: 640
    input_size_height: 640
