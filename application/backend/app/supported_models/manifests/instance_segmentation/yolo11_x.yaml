id: instance-segmentation-yolo11-x
name: YOLO11-X-Seg
license: AGPL-3.0

pretrained_weights:
  url: https://huggingface.co/Ultralytics/YOLO11/resolve/main/yolo11x-seg.pt
  mirror_url: https://github.com/ultralytics/assets/releases/download/v8.4.0/yolo11x-seg.pt
  sha_sum: "4e53a5f5fd3ee2ae3361c62169c6bb3ed4ae251dd0e57606e230955aa52d919c"

description: "YOLO11-X-Seg is the extra-large Ultralytics YOLO11 instance segmentation model. It targets maximum accuracy while using the Geti Tune data pipeline for preprocessing and dataset handling."
stats:
  gigaflops: 296.4
  trainable_parameters: 62.1
  benchmark_metrics:
    coco_map_50_95: 43.8

capabilities:
  tiling: false
  xai: false

hyperparameters:
  training:
    learning_rate: 0.001
    weight_decay: 0.0005
    max_epochs: 100
    early_stopping:
      enable: false
    batch_size: 4
    input_size_width: 640
    input_size_height: 640
    allowed_values_input_size:
      - 640
    scheduler:
      type: cosine_annealing
      warmup:
        enable: false
    gradient_clip:
      enable: true
      max_grad_norm: 10.0
    gradient_accumulation:
      enable: false
  dataset_preparation:
    augmentation:
      mosaic:
        enable: true
        probability: 1.0
        scale: 0.5
        translate: 0.1
      mixup:
        enable: false
        probability: 0.5
        alpha: 1.5
      color_jitter:
        enable: true
        brightness:
          - 0.6
          - 1.4
        contrast:
          - 0.6
          - 1.4
        saturation:
          - 0.3
          - 1.7
        hue:
          - -0.015
          - 0.015
        probability: 1.0
      random_horizontal_flip:
        enable: true
        probability: 0.5
