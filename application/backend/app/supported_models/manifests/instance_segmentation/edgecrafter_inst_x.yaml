id: instance-segmentation-edgecrafter-x
name: ECSeg-X

pretrained_weights:
  url: https://github.com/capsule2077/edgecrafter/releases/download/edgecrafterv1/ecseg_x.pth
  mirror_url: https://huggingface.co/Intellindust/ECSeg_X/resolve/main/model.safetensors
  sha_sum: 5e097fdc49cdf31dcc117f56b6504ee4afc9198378a02b3e7e2da69f1d4275a7

description: "EdgeCrafter instance segmentation model (ECSeg-X) extends ECDet with a mask prediction head for high-accuracy real-time instance segmentation."

stats:
  gigaflops: 168.0
  trainable_parameters: 50.0
  benchmark_metrics:
    coco_map_50_95: 48.4

capabilities:
  tiling: false

hyperparameters:
  training:
    learning_rate: 0.0001
    weight_decay: 0.0001
    early_stopping:
      patience: 15
    scheduler:
      factor: 0.1
      patience: 10
    gradient_clip:
      enable: true
      max_grad_norm: 0.1
    allowed_values_input_size:
      - 320
      - 448
      - 512
      - 576
      - 640
      - 704
      - 768
      - 896
    input_size_width: 640
    input_size_height: 640
  dataset_preparation:
    augmentation:
      random_zoom_out:
        enable: true
        fill: 0
        side_range:
          - 1.0
          - 4.0
        probability: 0.5
      iou_random_crop:
        enable: true
        probability: 1.0
        min_scale: 0.3
        max_scale: 1.0
