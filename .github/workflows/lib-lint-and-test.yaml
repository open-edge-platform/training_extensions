name: Geti Tune Library checks

on:
  merge_group:
    branches:
      - develop
      - release/**
  push:
    tags:
      - "v*"
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions: {} # No permissions by default

concurrency:
  group: lib-lint-and-test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Determines if workflow should execute based on event type and changed paths
  # If push or workflow_dispatch -> always run
  # If PR or merge_group -> run only if files in specified paths changed
  check-paths:
    name: Check if workflow should run
    runs-on: ubuntu-latest
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: ./.github/actions/check-paths
        with:
          files_yaml: |
            test:
              - library/**
              - .github/**

  code-quality-checks:
    runs-on: ubuntu-24.04
    needs: check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    permissions:
      contents: read
    steps:
      - *checkout

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          uv-cache-dependency-glob: "library/uv.lock"
          python-version: "3.10" # Use the lowest supported Python version for linting/type-checking

      - name: Run linters
        working-directory: library
        run: just lint

  unit-tests:
    runs-on: [self-hosted, linux, x64, dev, dmount]
    permissions:
      contents: read
      # The id-token permission is required by Codecov to use OIDC
      id-token: write
    needs:
      - check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
    name: unit-tests-with-Python${{ matrix.python-version }}
    steps:
      # YAML anchors not used cause currently zizmor don't support them in matrix strategies
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      # TODO remove after switching to an official Datumaro release with pre-built wheels
      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@6d653acede28d24f02e3cd41383119e8b1b35921
        with:
          toolchain: stable

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          uv-cache-dependency-glob: "library/uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Unit testing (excluding models)
        working-directory: library
        env:
          OMP_NUM_THREADS: "1"
        run: just test-unit

      # Unit test models separately using --forked flag so that each is run in a separate process.
      # Running these models after each other from the same process can cause segfaults
      - name: Unit testing models
        working-directory: library
        env:
          OMP_NUM_THREADS: "1"
        run: just test-unit-native-models

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          directory: library
          flags: coverage_unit-tests_Python-${{ matrix.python-version }}
          use_oidc: true

  integration-tests:
    runs-on: [self-hosted, linux, x64, dev, dmount]
    permissions:
      contents: read
    needs:
      - check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
        task:
          - "multi_class_cls"
          - "multi_label_cls"
          - "h_label_cls"
          - "keypoint_detection"
          - "detection"
          - "instance_segmentation"
          - "semantic_segmentation"
    name: integration-tests-${{ matrix.task }}-py${{ matrix.python-version }}
    steps:
      # YAML anchors aren't used because Zizmor fails here and support for them is best-effort for now
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          uv-cache-dependency-glob: "library/uv.lock"
          python-version: ${{ matrix.python-version }}

      # TODO remove after switching to an official Datumaro release with pre-built wheels
      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@6d653acede28d24f02e3cd41383119e8b1b35921
        with:
          toolchain: stable

      - name: Installing dependencies
        working-directory: library
        run: |
          uv lock --check
          uv sync --frozen --extra cuda

      - name: Integration testing
        working-directory: library
        env:
          CUBLAS_WORKSPACE_CONFIG: ":4096:8"
        run: just device='cuda' test-integration '${{ matrix.task }}_Python-${{ matrix.python-version }}.csv' '${{ matrix.task }}'

  required-check:
    name: Required Check lib-lint-and-test
    needs:
      - check-paths
      - code-quality-checks
      - unit-tests
      - integration-tests
    runs-on: ubuntu-latest
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
