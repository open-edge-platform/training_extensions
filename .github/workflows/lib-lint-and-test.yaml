name: Geti Library checks

on:
  merge_group:
    branches:
      - develop
      - release/**
  push:
    tags:
      - "v*"
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions: {} # No permissions by default

concurrency:
  group: lib-lint-and-test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Determines if workflow should execute based on event type and changed paths
  # If push or workflow_dispatch -> always run
  # If PR or merge_group -> run only if files in specified paths changed
  check-paths:
    name: Check if workflow should run
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: ./.github/actions/check-paths
        with:
          files_yaml: |
            test:
              - library/**
              - .github/**

  code-quality-checks:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    needs: check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    permissions:
      contents: read
    steps:
      - *checkout

      - name: Install Python, uv and Just
        uses: ./.github/actions/install-common-deps
        with:
          uv-version-file: library/pyproject.toml # Install the uv version specified in pyproject.toml
          python-version: "3.11" # Use the lowest supported Python version for linting/type-checking

      - name: Prepare venv and install Python dependencies
        working-directory: library
        env:
          GIT_LFS_SKIP_SMUDGE: "1" # Skip downloading LFS files for deps installed via git
        run: just venv

      - name: Run linters and type-checkers
        working-directory: library
        run: just lint

  unit-tests:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read
      # The id-token permission is required by Codecov to use OIDC
      id-token: write
    needs:
      - check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    name: unit-tests-with-Python${{ matrix.python-version }}
    steps:
      # YAML anchors not used cause currently zizmor don't support them in matrix strategies
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # TODO remove after switching to an official Datumaro release with pre-built wheels
      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install Python, uv and Just
        uses: ./.github/actions/install-common-deps
        with:
          uv-version-file: library/pyproject.toml # Install the uv version specified in pyproject.toml
          python-version: ${{ matrix.python-version }}

      - name: Installing dependencies
        working-directory: library
        env:
          GIT_LFS_SKIP_SMUDGE: "1" # Skip downloading LFS files for deps installed via git
        run: just venv

      - name: Unit testing
        working-directory: library
        env:
          OMP_NUM_THREADS: "1"
        run: just test-unit --cov --cov-report=xml --cov-append

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          directory: library
          flags: coverage_unit-tests_Python-${{ matrix.python-version }}
          use_oidc: true

  integration-tests:
    runs-on: [self-hosted, linux, x64, dev, dmount]
    permissions:
      contents: read
    needs:
      - check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
        task:
          - "multi_class_cls"
          - "multi_label_cls"
          - "h_label_cls"
          - "keypoint_detection"
          - "detection"
          - "instance_segmentation"
          - "semantic_segmentation"
    name: integration-tests-${{ matrix.task }}-py${{ matrix.python-version }}
    steps:
      # YAML anchors aren't used because Zizmor fails here and support for them is best-effort for now
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # TODO remove after switching to an official Datumaro release with pre-built wheels
      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install Python, uv and Just
        uses: ./.github/actions/install-common-deps
        with:
          uv-version-file: library/pyproject.toml # Install the uv version specified in pyproject.toml
          python-version: ${{ matrix.python-version }}

      - name: Installing dependencies
        working-directory: library
        env:
          GIT_LFS_SKIP_SMUDGE: "1" # Skip downloading LFS files for deps installed via git
        run: just venv --device cuda

      - name: Integration testing
        working-directory: library
        env:
          CUBLAS_WORKSPACE_CONFIG: ":4096:8"
        run: just test-integration \
          -ra \
          --showlocals \
          --csv=${{ matrix.task }}_Python-${{ matrix.python-version }}.csv \
          --task ${{ matrix.task }} \
          --open-subprocess \
          --run-category-only

  required-check:
    name: Required Check lib-lint-and-test
    needs:
      - check-paths
      - code-quality-checks
      - unit-tests
      - integration-tests
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
