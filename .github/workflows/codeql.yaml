name: "CodeQL scan"

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: ["develop", "releases/**"]
  pull_request:
    branches: ["develop", "releases/**"]

permissions: {}

jobs:
  check_paths:
    name: Check if workflow should run
    runs-on: ubuntu-latest
    if: ${{ github.event_name }} == 'pull_request'
    outputs:
      run_backend: ${{ steps.run_workflow.outputs.run_backend }}
      run_ui: ${{ steps.run_workflow.outputs.run_ui }}
      run_actions: ${{ steps.run_workflow.outputs.run_actions }}
      run_docs: ${{ steps.run_workflow.outputs.run_docs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Get all paths that should trigger the workflow
        id: changed-files-yaml
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46.0.5
        with:
          files_yaml: |
            backend:
              - backend/**
              - lib/**
            ui:
              - ui/**
            actions:
              - .github/**
            docs:
              - docs/**

      - name: Set run flags
        id: run_workflow
        env:
          BACKEND_ANY_CHANGED: ${{ steps.changed-files-yaml.outputs.backend_any_changed }}
          UI_ANY_CHANGED: ${{ steps.changed-files-yaml.outputs.ui_any_changed }}
          ACTIONS_ANY_CHANGED: ${{ steps.changed-files-yaml.outputs.actions_any_changed }}
          DOCS_ANY_CHANGED: ${{ steps.changed-files-yaml.outputs.docs_any_changed }}
        run: |
          if [ "$BACKEND_ANY_CHANGED" = "true" ]; then
            echo "run_backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_backend=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$UI_ANY_CHANGED" = "true" ]; then
            echo "run_ui=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_ui=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$ACTIONS_ANY_CHANGED" = "true" ]; then
            echo "run_actions=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_actions=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$DOCS_ANY_CHANGED" = "true" ]; then
            echo "run_docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_docs=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # required to publish sarif

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            run: ${{ needs.check_paths.outputs.run_actions || 'true' }}
          - language: python
            build-mode: none
            run: ${{ needs.check_paths.outputs.run_backend || 'true' }}
          - language: javascript-typescript
            build-mode: none
            run: ${{ needs.check_paths.outputs.run_ui || 'true' }}
          - language: rust
            build-mode: none
            run: ${{ needs.check_paths.outputs.run_docs || 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@96f518a34f7a870018057716cc4d7a5c014bd61c # v3.29.10
        if: ${{ matrix.run == 'true' }}
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@96f518a34f7a870018057716cc4d7a5c014bd61c # v3.29.10
        if: ${{ matrix.run == 'true' }}
        with:
          category: "/language:${{matrix.language}}"
