name: Build and upload to PyPI

on:
  workflow_dispatch: # run on request (no need for PR)
  push:
    tags:
      - 'lib/v[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+'   # RC: lib/v0.1.0rc1
      - 'lib/v[0-9]+\.[0-9]+\.[0-9]+'             # Release: lib/v0.1.0, lib/v0.1.2

permissions: {} # No permissions by default

jobs:
  build:
    name: Build & publish package
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    environment: pypi
    permissions:
      contents: write # required by svenstaro/upload-release-action
      id-token: write # required by trusted publisher
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build

      - name: Build sdist
        run: python -m build --sdist library/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact-sdist
          path: library/dist/*.tar.gz

      - name: Build wheel
        run: python -m build --wheel library/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact-wheel
          path: library/dist/*.whl

      # Determine where to publish the package distribution to PyPI or TestPyPI
      - name: Check tag
        id: check-tag
        uses: actions-ecosystem/action-regex-match@9e6c4fb3d5e898f505be7a1fb6e7b0a278f6665b # v2.0.2
        with:
          text: ${{ github.ref }}
          regex: '^refs/tags/lib/v[0-9]+\.[0-9]+\.[0-9]+$'

      - name: Upload package distributions to GitHub
        if: ${{ steps.check-tag.outputs.match != '' }}
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: library/dist/*
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true

      - name: Publish package distributions to PyPI
        if: ${{ steps.check-tag.outputs.match != '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Publish package distributions to TestPyPI
        if: ${{ steps.check-tag.outputs.match == '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true
          packages-dir: library/dist
