name: windows-installer
on:
  workflow_call:
    inputs:
      device:
        description: "Specifies the device to build the backend for (cpu, xpu, cuda)"
        type: string
        required: true
        default: "xpu"
      debug_build:
        description: "If the debug build should be produced"
        type: boolean
        required: false
        default: false
      tag:
        description: "Optional tag to append to the artifact name (e.g. rc1, beta)"
        type: string
        required: false
        default: ""
    secrets:
      MSIX_SIGN_CERTIFICATE:
        description: "Certificate for signing the MSIX package"
        required: false
      MSIX_SIGN_CERTIFICATE_PASSWORD:
        description: "Password for the signing certificate"
        required: false

  # allow to manually trigger this workflow
  workflow_dispatch:
    inputs:
      device:
        description: "Specifies the device to build the backend for (cpu, xpu, cuda)"
        required: true
        options:
          - xpu
          - cpu
          - cuda
        default: "xpu"
      debug_build:
        description: "If the debug build should be produced"
        required: false
        type: boolean
        default: false
      tag:
        description: "Optional tag to append to the artifact name (e.g. rc1, beta)"
        required: false
        type: string
        default: ""
      checkout_sha:
        description: "Full Commit SHA to checkout for building the application source code"
        required: true
        type: string

env:
  GIT_SH_PATH: C:\Program Files\Git\bin\sh.exe
  BACKEND_PATH: .\application\backend
  UI_PATH: .\application\ui
  BACKEND_BUILD_PATH: .\application\backend\.build
  BACKEND_DIST_PATH: .\application\backend\dist\geti-backend
  UI_SRC_API_PATH: .\application\ui\src\api
  UI_SRC_TAURI_PATH: .\application\ui\src-tauri
  UI_TARGET_PATH: .\application\ui\src-tauri\target
  MAKEAPP_PATH: "C:\\Program Files (x86)\\Windows Kits\\10\\bin\\10.0.26100.0\\x64\\makeappx.exe"
  SIGNTOOL_PATH: "C:\\Program Files (x86)\\Windows Kits\\10\\bin\\10.0.26100.0\\x64\\signtool.exe"
  FFMPEG_COMMIT: "00d1f41b2eb070803a927c6132c240e14142d0b9"

permissions: {} # No permissions by default on workflow level

jobs:
  windows-installer:
    name: Build windows installer
    runs-on: windows-latest
    permissions:
      contents: read
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.checkout_sha || github.sha }}
          persist-credentials: false

      - name: Get build version from application/VERSION
        id: get_version
        run: |
          $version = (Get-Content "application\VERSION" -Raw).Trim()
          if (-not $version) {
            throw "application/VERSION is empty"
          }
          Write-Host "Version from application/VERSION: $version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"

      - name: Define paths
        env:
          DEBUG_BUILD: ${{ inputs.debug_build }}
          DEVICE: ${{ inputs.device || 'xpu' }}
          BUILD_VERSION: ${{ steps.get_version.outputs.version }}
          TAG: ${{ inputs.tag }}
        run: |
          Write-Host "DEBUG_BUILD=$env:DEBUG_BUILD"

          $TARGET = $(IF ($env:DEBUG_BUILD -eq "true") {"debug"} else {"release"})
          $UI_BUILD_PATH = $env:UI_TARGET_PATH + "\" + $TARGET
          Write-Host "UI_BUILD_PATH=$UI_BUILD_PATH"
          Add-Content -Path $env:GITHUB_ENV -Value "UI_BUILD_PATH=$UI_BUILD_PATH"

          $UI_MSIX_BUNDLE_PATH = $UI_BUILD_PATH + "\bundle\msix"  
          Write-Host "UI_MSIX_BUNDLE_PATH=$UI_MSIX_BUNDLE_PATH"
          Add-Content -Path $env:GITHUB_ENV -Value "UI_MSIX_BUNDLE_PATH=$UI_MSIX_BUNDLE_PATH"

          $TAG_SUFFIX = $(IF ($env:TAG) {"-" + $env:TAG} else {""})
          $DEBUG_SUFFIX = $(IF ($env:DEBUG_BUILD -eq "true") {"-debug"} else {""})
          $SUFFIX = $TAG_SUFFIX + $DEBUG_SUFFIX
          $ARTIFACT_NAME = "geti-" + $env:DEVICE + "-" + $env:BUILD_VERSION + $SUFFIX
          $MSIX_FILE_NAME = $ARTIFACT_NAME + ".msix"
          $MSIX_FILE_PATH = $UI_MSIX_BUNDLE_PATH + "\" + $MSIX_FILE_NAME
          Write-Host "ARTIFACT_NAME=$ARTIFACT_NAME"
          Write-Host "MSIX_FILE_PATH=$MSIX_FILE_PATH"
          Add-Content -Path $env:GITHUB_ENV -Value "ARTIFACT_NAME=$ARTIFACT_NAME"
          Add-Content -Path $env:GITHUB_ENV -Value "MSIX_FILE_PATH=$MSIX_FILE_PATH"


      # Install and setup build tools

      - name: Install Python, uv and Just
        uses: ./.github/actions/install-common-deps
        with:
          uv-version-file: application/backend/pyproject.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Cache Rust dependencies & target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ startsWith(github.ref_name, 'release/') || github.ref_name == 'develop' }}
          workspaces: application\ui\src-tauri -> target

      # Build or restore cached PyAV wheel

      - name: Compute PyAV wheel cache key
        id: pyav_cache_key
        run: |
          $pyavVersion = (Select-String -Path "application\backend\pyproject.toml" -Pattern '"av~=([^"]+)"' | ForEach-Object { $_.Matches.Groups[1].Value })
          $pythonVersion = (python --version 2>&1) -replace 'Python ',''
          $cacheKey = "pyav-wheel-win-ffmpeg-${{ env.FFMPEG_COMMIT }}-av-${pyavVersion}-py-${pythonVersion}"
          Write-Host "Cache key: $cacheKey"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "cache-key=$cacheKey"

      - name: Restore PyAV wheel from cache
        id: pyav_cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: application/backend/.pyav-wheel
          key: ${{ steps.pyav_cache_key.outputs.cache-key }}

      # Build custom ffmpeg (only on cache miss)

      - name: Install MSYS2 (for FFmpeg build tools)
        if: steps.pyav_cache.outputs.cache-hit != 'true'
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-nasm
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-libvpx
            mingw-w64-ucrt-x86_64-opus
            git
            diffutils
            make

      - name: Configure custom prefix
        if: steps.pyav_cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          PREFIX="/c/ffmpeg-build"
          mkdir -p "$PREFIX"
          echo "PREFIX=$PREFIX" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> $GITHUB_ENV

      - name: Build OpenH264 from source
        if: steps.pyav_cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        env:
          OPENH264_COMMIT: "e3f5b10438e2bacc155cf54578222bd4236c9f06"
        run: |
          set -euo pipefail
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

          git init openh264
          cd openh264
          git remote add origin https://github.com/cisco/openh264.git
          git fetch --depth 1 origin "${OPENH264_COMMIT}"
          git checkout FETCH_HEAD

          make -j$(nproc) \
            PREFIX="$PREFIX" \
            BUILDTYPE=Release \
            OS=mingw_nt \
            ARCH=x86_64 \
            install

          # Verify install
          pkg-config --modversion openh264
          
      - name: Build SVT-AV1 from source
        if: steps.pyav_cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        env:
          SVT_AV1_COMMIT: "e7fcc226994c87b76b66389545eb73a844f13002"
        run: |
          set -euo pipefail
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

          git init svtav1
          cd svtav1
          git remote add origin https://gitlab.com/AOMediaCodec/SVT-AV1.git
          git fetch --depth 1 origin "${SVT_AV1_COMMIT}"
          git checkout FETCH_HEAD

          cmake -B build -G "Ninja" \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTING=OFF \
            -DBUILD_APPS=OFF \
            -DBUILD_DEC=ON \
            -DBUILD_ENC=ON

          cmake --build build -j$(nproc)
          cmake --install build

          # Verify install
          pkg-config --modversion SvtAv1Enc

      - name: Build libvpl (oneVPL) from source
        if: steps.pyav_cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        env:
          LIBVPL_COMMIT: "778a66d6c6537f08eabb91955dbbf1bce3812894"
        run: |
          set -euo pipefail
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

          git init libvpl
          cd libvpl
          git remote add origin https://github.com/intel/libvpl.git
          git fetch --depth 1 origin "${LIBVPL_COMMIT}"
          git checkout FETCH_HEAD

          cmake -B build -G "Ninja" \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTS=OFF \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_TOOLS=OFF

          cmake --build build -j$(nproc)
          cmake --install build

          # Verify install
          pkg-config --modversion vpl

      - name: Build FFmpeg from source
        if: steps.pyav_cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}"

          export CFLAGS="-I$PREFIX/include"
          export LDFLAGS="-L$PREFIX/lib -L$PREFIX/lib64"

          # Clone and checkout FFmpeg source
          git init ffmpeg
          cd ffmpeg
          git remote add origin https://github.com/FFmpeg/FFmpeg.git
          git fetch --depth 1 origin "${FFMPEG_COMMIT}"
          git checkout FETCH_HEAD

          ./configure \
            --prefix="$PREFIX" \
            --extra-libs="-lpthread -lm" \
            --enable-libvpl \
            --enable-shared \
            --enable-libsvtav1 \
            --enable-libopenh264 \
            --enable-libvpx

          make -j$(nproc)
          make install

          # Verify headers and libraries are installed
          ls "$PREFIX/include/libavcodec/avcodec.h"
          ls "$PREFIX/lib/pkgconfig/libavcodec.pc"
          pkg-config --modversion libavcodec libavformat libswscale
          "$PREFIX/bin/ffmpeg" -version
          "$PREFIX/bin/ffmpeg" -hide_banner -encoders | grep qsv
          "$PREFIX/bin/ffmpeg" -hide_banner -h encoder=h264_qsv

      - name: Copy runtime DLLs into FFmpeg prefix
        if: steps.pyav_cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          # Copy MinGW runtime DLLs and transitive dependencies into FFmpeg bin dir
          for dll in libgcc_s_seh-1.dll libwinpthread-1.dll libstdc++-6.dll \
                     libiconv-2.dll liblzma-5.dll zlib1.dll libbz2-1.dll; do
            if [ -f "/ucrt64/bin/$dll" ]; then
              cp "/ucrt64/bin/$dll" "$PREFIX/bin/"
              echo "Copied $dll to $PREFIX/bin/"
            fi
          done
          # Also copy codec runtime DLLs that FFmpeg depends on
          for pattern in libvpx-*.dll libopus-*.dll; do
            for f in /ucrt64/bin/$pattern; do
              if [ -f "$f" ]; then
                cp "$f" "$PREFIX/bin/"
                echo "Copied $(basename $f) to $PREFIX/bin/"
              fi
            done
          done

      - name: Set up MSVC developer environment
        if: steps.pyav_cache.outputs.cache-hit != 'true'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: x64

      - name: Generate MSVC import libraries from FFmpeg DLLs
        if: steps.pyav_cache.outputs.cache-hit != 'true'
        run: |
          $BIN_PATH = "C:\ffmpeg-build\bin"
          $LIB_PATH = "C:\ffmpeg-build\lib"
          $ffmpegLibs = @("avformat", "avcodec", "avdevice", "avutil", "avfilter", "swscale", "swresample")
          foreach ($lib in $ffmpegLibs) {
            $dll = Get-ChildItem "$BIN_PATH\$lib*.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($dll) {
              Write-Host "Generating $lib.lib from $($dll.Name)"
              $defFile = "$LIB_PATH\$lib.def"
              $libFile = "$LIB_PATH\$lib.lib"
              dumpbin /EXPORTS $dll.FullName /OUT:"$LIB_PATH\$lib.exports.txt"
              $defContent = "LIBRARY $($dll.Name)`nEXPORTS`n"
              Get-Content "$LIB_PATH\$lib.exports.txt" | ForEach-Object {
                if ($_ -match "^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)") {
                  $defContent += "  $($Matches[1])`n"
                }
              }
              Set-Content -Path $defFile -Value $defContent -NoNewline
              lib /machine:x64 /def:$defFile /out:$libFile /nologo
              if (Test-Path $libFile) {
                Write-Host "  Created $libFile"
              } else {
                throw "Failed to create $libFile"
              }
            } else {
              Write-Host "WARNING: DLL not found for $lib at $BIN_PATH"
            }
          }

      - name: Configure PyAV build environment
        if: steps.pyav_cache.outputs.cache-hit != 'true'
        run: |
          $FFMPEG_PREFIX = "C:\ffmpeg-build"

          # Verify the headers exist
          if (-not (Test-Path "$FFMPEG_PREFIX\include\libavcodec\avcodec.h")) {
            throw "FFmpeg headers not found at $FFMPEG_PREFIX\include\libavcodec\avcodec.h"
          }
          Write-Host "FFmpeg headers verified at $FFMPEG_PREFIX\include"

          # Set INCLUDE and LIB for MSVC compiler/linker
          $currentInclude = [System.Environment]::GetEnvironmentVariable("INCLUDE", "Process")
          $currentLib = [System.Environment]::GetEnvironmentVariable("LIB", "Process")
          Add-Content -Path $env:GITHUB_ENV -Value "INCLUDE=$FFMPEG_PREFIX\include;$currentInclude"
          Add-Content -Path $env:GITHUB_ENV -Value "LIB=$FFMPEG_PREFIX\lib;$currentLib"

          # Tell uv to forward INCLUDE and LIB into isolated build environments
          Add-Content -Path $env:GITHUB_ENV -Value "UV_BUILD_ENV_VARS=INCLUDE,LIB"

          # Add to PATH so DLLs are findable during build
          Add-Content -Path $env:GITHUB_PATH -Value "$FFMPEG_PREFIX\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\msys64\ucrt64\bin"

      - name: Build PyAV wheel from source
        if: steps.pyav_cache.outputs.cache-hit != 'true'
        working-directory: application/backend
        env:
          UV_NO_BINARY_PACKAGE: av
        run: |
          $wheelDir = ".pyav-wheel"
          New-Item -ItemType Directory -Force -Path $wheelDir | Out-Null

          # Build PyAV from source against our custom FFmpeg
          uv pip wheel "av~=16.1.0" --no-deps --wheel-dir $wheelDir

          Write-Host "Built PyAV wheel:"
          Get-ChildItem $wheelDir -Filter "av-*.whl" | ForEach-Object { Write-Host "  $($_.Name)" }

          # Copy FFmpeg runtime DLLs into the cache directory for reuse
          $dllDir = "$wheelDir\ffmpeg-dlls"
          New-Item -ItemType Directory -Force -Path $dllDir | Out-Null
          Copy-Item "C:\ffmpeg-build\bin\*.dll" -Destination $dllDir -Force
          Write-Host "Cached FFmpeg DLLs to $dllDir"

      - name: Configure uv to use cached PyAV wheel
        working-directory: application/backend
        run: |
          $wheelDir = (Resolve-Path ".pyav-wheel").Path
          Write-Host "Using PyAV wheel from: $wheelDir"
          Add-Content -Path $env:GITHUB_ENV -Value "UV_FIND_LINKS=$wheelDir"

      # Build backend

      - name: Prepare venv and install Python dependencies
        working-directory: application/backend
        env:
          GIT_LFS_SKIP_SMUDGE: "1" # Skip downloading LFS files for deps installed via git
          DEVICE: ${{ inputs.device || 'xpu' }}
        run: just venv --accelerator "$env:DEVICE"

      - name: Copy FFmpeg DLLs and patch PyAV for DLL loading
        working-directory: application/backend
        run: |
          $avDir = ".venv\Lib\site-packages\av"
          $ffmpegBin = ".pyav-wheel\ffmpeg-dlls"

          # Copy all FFmpeg DLLs into the av package directory
          Copy-Item "$ffmpegBin\*.dll" -Destination $avDir -Force
          Write-Host "Copied DLLs to $avDir"

          # Patch av/__init__.py to add the DLL directory before importing _core
          $avInit = "$avDir\__init__.py"
          $original = Get-Content $avInit -Raw
          $patch = @'
          import os as _os, sys as _sys
          if _sys.platform == 'win32':
              _av_dir = _os.path.dirname(_os.path.abspath(__file__))
              _dll_dir_handle = _os.add_dll_directory(_av_dir)
          '@
          $patched = $patch + "`n" + $original
          Set-Content -Path $avInit -Value $patched -NoNewline
          Write-Host "Patched $avInit"


      - name: Verify PyAV import
        working-directory: application/backend
        run: |
          .\.venv\Scripts\python.exe -c "import av; print(f'PyAV {av.__version__} loaded successfully')"

      - name: Build OpenAPI spec
        working-directory: application/backend
        run: just gen-api-spec -o .build/openapi-spec.json

      - name: Build executable
        working-directory: application/backend
        env:
          DEVICE: ${{ inputs.device || 'xpu' }}
        run: just pyinstaller --accelerator "$env:DEVICE"

      # Copy backend artifacts to UI

      - name: Copy backend artifacts to UI
        run: |
          cp -r ${{ env.BACKEND_DIST_PATH }}\_internal ${{ env.UI_SRC_TAURI_PATH }}
          cp -r ${{ env.BACKEND_DIST_PATH }}\geti-backend.exe ${{ env.UI_SRC_TAURI_PATH }}\geti-backend-x86_64-pc-windows-msvc.exe

      - name: Copy OpenAPI spec
        run: cp -r ${{ env.BACKEND_BUILD_PATH }}\openapi-spec.json ${{ env.UI_SRC_API_PATH }}

      # Build UI with Tauri

      - name: Setup Node & npm
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: application/ui/.nvmrc
          cache: "npm"
          cache-dependency-path: application/ui/package-lock.json

      - name: Enable long paths
        run: reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f

      - name: Configure Git long paths
        run: git config --system core.longpaths true

      - name: Install dependencies
        working-directory: application/ui
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build OpenAPI type definitions
        working-directory: application/ui
        run: npm run build:api

      - name: Build Tauri app
        env:
          PUBLIC_API_URL: http://localhost:9100
          DEBUG_BUILD: ${{ inputs.debug_build }}
        working-directory: application/ui
        run: |
          $OPTIONS = @()
          if ($env:DEBUG_BUILD -eq "true") {
            $OPTIONS += "--debug"
          }
          Write-Host "Building Tauri app with options: $($OPTIONS -join ' ')"
          cargo tauri build @OPTIONS

      # Build MSIX bundle

      - name: Create MSIX package
        run: |
          mkdir -p $env:UI_MSIX_BUNDLE_PATH
          cp $env:UI_BUILD_PATH\geti-backend.exe $env:UI_MSIX_BUNDLE_PATH
          cp $env:UI_BUILD_PATH\geti_ui.exe $env:UI_MSIX_BUNDLE_PATH
          cp -r $env:UI_BUILD_PATH\_internal $env:UI_MSIX_BUNDLE_PATH
          cp -r ${{ env.UI_SRC_TAURI_PATH }}\msix\* $env:UI_MSIX_BUNDLE_PATH
          & "${{ env.MAKEAPP_PATH }}" pack /d $env:UI_MSIX_BUNDLE_PATH /p $env:MSIX_FILE_PATH

      - name: Sign MSIX package
        env:
          MSIX_SIGN_CERTIFICATE: ${{ secrets.MSIX_SIGN_CERTIFICATE }}
          MSIX_SIGN_CERTIFICATE_PASSWORD: ${{ secrets.MSIX_SIGN_CERTIFICATE_PASSWORD }}
        run: |
          $bytes = [System.Convert]::FromBase64String($env:MSIX_SIGN_CERTIFICATE)
          [System.IO.File]::WriteAllBytes("sign.pfx", $bytes)
          try {
            & "${{ env.SIGNTOOL_PATH }}" sign /fd SHA256 /a /f "sign.pfx" /p "$env:MSIX_SIGN_CERTIFICATE_PASSWORD" $env:MSIX_FILE_PATH
          }
          finally {
            if (Test-Path "sign.pfx") {
              Remove-Item "sign.pfx" -Force
            }
          }

      - name: Upload MSIX package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.MSIX_FILE_PATH }}
          retention-days: 20
