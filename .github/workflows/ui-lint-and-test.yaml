name: Geti UI checks

on:
  merge_group:
    branches:
      - develop
      - release/**
  push:
    tags:
      - "v*"
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions: {} # No permissions by default on workflow level

concurrency:
  group: ui-lint-and-test-${{ github.workflow }}-${{
    github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Determines if workflow should execute based on event type and changed paths
  # If push or workflow_dispatch -> always run
  # If PR or merge_group -> run only if files in specified paths changed
  check_paths:
    name: Check if workflow should run
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' ||
      'ubuntu-latest' }}
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: ./.github/actions/check-paths
        with:
          files_yaml: |
            test:
              - application/backend/**
              - application/ui/**
              - .github/**

  generate-openapi-spec:
    name: Generate OpenAPI Spec
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' ||
      'ubuntu-latest' }}
    needs: check_paths
    if: needs.check_paths.outputs.run_workflow == 'true'
    permissions:
      contents: read # to checkout code
    steps:
      - *checkout

      - name: Install Python, uv and Just
        uses: ./.github/actions/install-common-deps
        with:
          uv-version-file: application/backend/pyproject.toml # Install the uv version specified in pyproject.toml

      - name: Prepare venv and install Python dependencies
        working-directory: application/backend
        env:
          GIT_LFS_SKIP_SMUDGE: "1" # Skip downloading LFS files for deps installed via git
        run: just venv

      - name: Get OpenAPI spec
        working-directory: application/backend
        run: just gen-api-spec -o openapi-spec.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openapi-spec
          path: application/backend/openapi-spec.json

  build:
    name: Build UI
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' ||
      'ubuntu-latest' }}
    needs: check_paths
    if: needs.check_paths.outputs.run_workflow == 'true'
    permissions:
      contents: read # to checkout code
    steps:
      - *checkout

      - &setup-node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        id: setup-node
        with:
          node-version-file: application/ui/.nvmrc
          package-manager-cache: false

      - &install-dependencies
        name: Install dependencies
        working-directory: "application/ui"
        run: npm ci

      - name: Build UI
        working-directory: "application/ui"
        run: npm run build

      - name: Compress build
        working-directory: "application/ui"
        env:
          PUBLIC_API_BASE_URL: http://localhost:7860
        run: tar -czf dist.tar.gz dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-dist
          path: "application/ui/dist.tar.gz"

  lint:
    name: Eslint checks
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' ||
      'ubuntu-latest' }}
    needs:
      - check_paths
      - generate-openapi-spec
    if: needs.check_paths.outputs.run_workflow == 'true'
    permissions:
      contents: read # to checkout code
    steps:
      - *checkout

      - *setup-node

      - *install-dependencies

      - &download-openapi-spec
        name: Download OpenAPI spec artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: openapi-spec
          path: application/ui/src/api

      - &build-openapi-types
        name: Build OpenAPI type definitions
        working-directory: "application/ui"
        run: npm run build:api

      - name: Prettier
        working-directory: "application/ui"
        run: npm run format:check

      - name: Eslint
        working-directory: "application/ui"
        run: npm run lint

      - name: Eslint cyclic imports
        working-directory: "application/ui"
        run: npm run cyclic-deps-check

      - name: Typescript
        working-directory: "application/ui"
        run: npm run type-check

  unit-tests:
    name: Unit tests
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' ||
      'ubuntu-latest' }}
    needs:
      - check_paths
      - generate-openapi-spec
    if: needs.check_paths.outputs.run_workflow == 'true'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - *checkout

      - *setup-node

      - *install-dependencies

      - *download-openapi-spec

      - *build-openapi-types

      - name: UI Unit tests
        working-directory: "application/ui"
        run: npm run test:unit:coverage

      - name: Generate coverage report
        if: github.event.pull_request.head.repo.full_name == github.repository
        working-directory: "application/ui"
        run: |
          echo "## 📊 Test coverage report" > coverage.md
          if [ -f "coverage/coverage-summary.json" ]; then
            node -e "
              const fs = require('fs');
              try {
                  const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
                  const lines = \`\${coverage.total.lines.pct.toFixed(1)}%\`;
                  const functions = \`\${coverage.total.functions.pct.toFixed(1)}%\`;
                  const branches = \`\${coverage.total.branches.pct.toFixed(1)}%\`;
                  const statements = \`\${coverage.total.statements.pct.toFixed(1)}%\`;
                  
                  console.log(\`| Metric | Coverage |\`);
                  console.log(\`| --- | --- |\`);
                  console.log(\`| Lines | \${lines} |\`);
                  console.log(\`| Functions | \${functions} |\`);
                  console.log(\`| Branches | \${branches} |\`);
                  console.log(\`| Statements | \${statements} |\`);
              } catch {
                console.error('Failed to parse coverage summary');
              }
            " >> coverage.md
          else
            echo "No coverage summary found" >> coverage.md
          fi

      - name: Comment PR with coverage report
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');

            let coverageComment = '';
            try {
              coverageComment = fs.readFileSync('application/ui/coverage.md', 'utf8');
            } catch (error) {
              coverageComment = '## 📊 Test Coverage Report\n\nCoverage report generation failed.';
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existingComment = comments.data.find((comment) => comment.body.includes("Test coverage report"));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: coverageComment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: coverageComment
              });
            }

  playwright-tests:
    name: Playwright Tests
    needs:
      - check_paths
      - build
      - generate-openapi-spec
    if: needs.check_paths.outputs.run_workflow == 'true'
    permissions:
      contents: read # to checkout code
    timeout-minutes: 60
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' ||
      'ubuntu-latest' }}
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy@sha256:6aca677c27a967caf7673d108ac67ffaf8fed134f27e17b27a05464ca0ace831
    steps:
      - *checkout

      - *setup-node

      - *install-dependencies

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ui-dist
          path: "application/ui"

      - name: Unpack build
        working-directory: "application/ui"
        run: tar -xzf dist.tar.gz

      - *download-openapi-spec

      - *build-openapi-types

      - name: Run Playwright tests
        working-directory: "application/ui"
        run: npm run test:component -- --project "component"

      - name: Upload blob report to GitHub Actions Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: application/ui/playwright-report/
          retention-days: 30

  required_check:
    name: Required Check ui-lint-and-test
    needs:
      - check_paths
      - generate-openapi-spec
      - build
      - lint
      - unit-tests
      - playwright-tests
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' ||
      'ubuntu-latest' }}
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
