# OTX Model Benchmark Workflow
#
# Automated benchmarking of OTX models on curated datasets.
# Results are logged to a centralized MLflow tracking server and
# summarized as Markdown reports
#
# Triggers:
#   - Weekly full benchmark (Friday 19:00 UTC) — core + extended models, all dataset tiers
#   - Manual workflow_dispatch — full control over all parameters
#
# Self-hosted runner labels:
#   gpu — NVIDIA GPU runner
#   xpu — Intel XPU runner

name: Model Benchmark

on:
  schedule:
    - cron: "0 19 * * 5" # Weekly full: Friday 19:00 UTC
  workflow_dispatch:
    inputs:
      task:
        description: "Task filter (e.g. detection, all)"
        default: "all"
      model:
        description: "Model filter (comma-separated, or 'all')"
        default: "all"
      priority:
        description: "Model priority tiers to include"
        default: "core,extended"
        type: choice
        options:
          - core
          - "core,extended"
          - "core,extended,exploratory"
      size_tier:
        description: "Dataset size tiers to include"
        default: "tiny,small,medium"
      scenario:
        description: "Scenario filter (default, tiling, lr_high, ... or 'all')"
        default: "default"
      accelerator:
        description: "Accelerator target"
        default: "gpu"
        type: choice
        options: [gpu, xpu]
      eval_upto:
        description: "Last evaluation phase (train → export → optimize)"
        default: "optimize"
        type: choice
        options: [train, export, optimize]
      num_seeds:
        description: "Number of seeds per experiment"
        default: "2"

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

# ---------------------------------------------------------------------------
# Job 1: Determine run parameters based on trigger type
# ---------------------------------------------------------------------------
jobs:
  configure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      priority: ${{ steps.cfg.outputs.priority }}
      size_tier: ${{ steps.cfg.outputs.size_tier }}
      num_seeds: ${{ steps.cfg.outputs.num_seeds }}
      eval_upto: ${{ steps.cfg.outputs.eval_upto }}
      scenario: ${{ steps.cfg.outputs.scenario }}
      accelerators: ${{ steps.cfg.outputs.accelerators }}
      trigger: ${{ steps.cfg.outputs.trigger }}
      should_run: ${{ steps.cfg.outputs.should_run }}
      rotation_group: ${{ steps.cfg.outputs.rotation_group }}
    steps:
      - name: Checkout manifest
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: library/benchmark_manifest.yaml
          sparse-checkout-cone-mode: false

      - id: cfg
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_PRIORITY: ${{ inputs.priority }}
          INPUT_SIZE_TIER: ${{ inputs.size_tier }}
          INPUT_NUM_SEEDS: ${{ inputs.num_seeds }}
          INPUT_EVAL_UPTO: ${{ inputs.eval_upto }}
          INPUT_SCENARIO: ${{ inputs.scenario }}
          INPUT_ACCELERATOR: ${{ inputs.accelerator }}
        run: |
          # Read rotation groups from manifest
          EXTENDED_GROUPS=$(grep 'extended_groups' library/benchmark_manifest.yaml | awk '{print $2}')
          EXTENDED_GROUPS=${EXTENDED_GROUPS:-4}

          # ── workflow_dispatch: use inputs directly ──────────────────────
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "priority=$INPUT_PRIORITY" >> "$GITHUB_OUTPUT"
            echo "size_tier=$INPUT_SIZE_TIER" >> "$GITHUB_OUTPUT"
            echo "num_seeds=$INPUT_NUM_SEEDS" >> "$GITHUB_OUTPUT"
            echo "eval_upto=$INPUT_EVAL_UPTO" >> "$GITHUB_OUTPUT"
            echo "scenario=$INPUT_SCENARIO" >> "$GITHUB_OUTPUT"
            echo "accelerators=[\"$INPUT_ACCELERATOR\"]" >> "$GITHUB_OUTPUT"
            echo "trigger=manual" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "rotation_group=" >> "$GITHUB_OUTPUT"

          # ── Weekly full: Friday schedule ────────────────────────────────
          elif [[ "$EVENT_SCHEDULE" == "0 19 * * 5" ]]; then
            # Compute rotation group: ISO week number mod extended_groups from manifest
            ROTATION_GROUP=$(( $(date +%V) % EXTENDED_GROUPS ))
            echo "priority=core,extended" >> "$GITHUB_OUTPUT"
            echo "size_tier=tiny,small,medium" >> "$GITHUB_OUTPUT"
            echo "num_seeds=3" >> "$GITHUB_OUTPUT"
            echo "eval_upto=optimize" >> "$GITHUB_OUTPUT"
            echo "scenario=default" >> "$GITHUB_OUTPUT"
            echo "accelerators=[\"gpu\",\"xpu\"]" >> "$GITHUB_OUTPUT"
            echo "trigger=weekly" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "rotation_group=$ROTATION_GROUP" >> "$GITHUB_OUTPUT"


          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Job 2: Run benchmarks on a self-hosted GPU runner
  # ---------------------------------------------------------------------------
  benchmark:
    needs: configure
    if: needs.configure.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        accelerator: ${{ fromJSON(needs.configure.outputs.accelerators) }}
    runs-on: [self-hosted, "${{ matrix.accelerator }}"]
    permissions:
      contents: read
    timeout-minutes: 4320 # 72h safety net for large weekly runs
    defaults:
      run:
        working-directory: library

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          clean: true

      - name: Ensure MLflow server is running
        working-directory: library/docker
        run: |
          docker compose up -d --wait
          echo "✅ MLflow server is healthy at localhost:5000"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install OTX + benchmark dependencies
        env:
          ACCEL: ${{ matrix.accelerator }}
        run: |
          # Map accelerator label to the pyproject.toml extra name
          if [[ "$ACCEL" == "gpu" ]]; then EXTRA="cuda"; else EXTRA="$ACCEL"; fi
          uv sync --frozen --extra "$EXTRA"

      # ── Dataset provisioning with cache ──────────────────────────────
      - name: Restore dataset cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: library/data/
          key: benchmark-datasets-${{ hashFiles('library/benchmark_catalog.yaml') }}
          restore-keys: benchmark-datasets-

      - name: Provision datasets
        run: |
          uv run python -m otx.benchmark provision \
            --catalog benchmark_catalog.yaml \
            --data-root data/

      # ── Run benchmarks ───────────────────────────────────────────────
      - name: Run benchmarks
        env:
          TRIGGER: ${{ needs.configure.outputs.trigger }}
          BRANCH: ${{ github.ref_name }}
          PRIORITY: ${{ needs.configure.outputs.priority }}
          SIZE_TIER: ${{ needs.configure.outputs.size_tier }}
          EVAL_UPTO: ${{ needs.configure.outputs.eval_upto }}
          ACCELERATOR: ${{ matrix.accelerator }}
          NUM_SEEDS: ${{ needs.configure.outputs.num_seeds }}
          SCENARIO: ${{ needs.configure.outputs.scenario }}
          ROTATION_GROUP: ${{ needs.configure.outputs.rotation_group }}
        run: |
          # Build rotation flags
          ROTATION_FLAGS=""
          if [[ -n "$ROTATION_GROUP" ]]; then
            ROTATION_FLAGS="--rotation-group $ROTATION_GROUP"
          else
            ROTATION_FLAGS="--no-rotation"
          fi

          uv run python -m otx.benchmark run \
            --manifest benchmark_manifest.yaml \
            --catalog benchmark_catalog.yaml \
            --data-root data/ \
            --output-root results/ \
            --mlflow-uri "http://localhost:5000" \
            --branch "$BRANCH" \
            --trigger "$TRIGGER" \
            --priority "$PRIORITY" \
            --size-tier "$SIZE_TIER" \
            --eval-upto "$EVAL_UPTO" \
            --accelerator "$ACCELERATOR" \
            --num-seeds "$NUM_SEEDS" \
            --scenario "$SCENARIO" \
            $ROTATION_FLAGS

      # ── Disk cleanup: remove heavy artifacts, keep only metrics ─────
      - name: Cleanup checkpoints and exported models
        if: always()
        run: |
          echo "Disk usage before cleanup:"
          du -sh results/ || true

          # Remove training checkpoints (large .ckpt files)
          find results/ -name "*.ckpt" -delete 2>/dev/null || true
          # Remove exported/optimized OpenVINO models
          find results/ -name "*.xml" -delete 2>/dev/null || true
          find results/ -name "*.bin" -delete 2>/dev/null || true
          # Remove any __pycache__ or .pyc files
          find results/ -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true

          echo "Disk usage after cleanup:"
          du -sh results/ || true

      # ── Generate standalone report (fallback if run step failed) ────
      - name: Generate report
        if: always()
        env:
          BRANCH: ${{ github.ref_name }}
          TRIGGER: ${{ needs.configure.outputs.trigger }}
          ACCELERATOR: ${{ matrix.accelerator }}
        run: |
          uv run python -m otx.benchmark report \
            --manifest benchmark_manifest.yaml \
            --mlflow-uri "http://localhost:5000" \
            --branch "$BRANCH" \
            --trigger "$TRIGGER" \
            --accelerator "$ACCELERATOR" \
            --output-root results/ \
            --output results/report.md

      # ── Upload artifacts ─────────────────────────────────────────────
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results-${{ matrix.accelerator }}-${{ github.sha }}
          path: |
            library/results/report.md
            library/results/aggregated.csv
            library/results/failed_experiments.json
          retention-days: 90

      # ── MLflow retention: prune old feature-branch runs ────────────
      - name: Cleanup old MLflow runs
        if: always() && needs.configure.outputs.trigger == 'weekly'
        run: |
          uv run python -m otx.benchmark clean \
            --mlflow-uri "http://localhost:5000" \
            --max-age-days 365 \
            --protect-branch develop main

      # ── Post report to job summary (visible on all triggers) ────────
      - name: Write job summary
        if: always()
        run: |
          if [[ -f results/report.md ]]; then
            cat results/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ No benchmark report was generated." >> "$GITHUB_STEP_SUMMARY"
          fi
