name: Geti Tune UI checks

on:
  push:
    branches: [main]
  pull_request:

permissions: {} # No permissions by default on workflow level

jobs:
  generate-openapi-spec:
    name: Generate OpenAPI Spec
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout code
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@557e51de59eb14aaaba2ed9621916900a91d50c6 # v6.6.1
        with:
          version: "0.8.8"

      - name: Install OpenCV dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Prepare venv and install Python dependencies
        working-directory: backend
        run: |
          uv lock --check
          uv sync --frozen --all-extras

      - name: Get OpenAPI spec
        working-directory: backend
        run: |
          export PYTHONPATH=.
          uv run app/cli.py gen-api --target-path openapi-spec.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: openapi-spec
          path: backend/openapi-spec.json

  build:
    name: Build UI
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout code
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        id: setup-node
        with:
          node-version-file: ui/.nvmrc

      - name: Install dependencies
        working-directory: "ui"
        run: npm ci

      - name: Build UI
        working-directory: "ui"
        run: npm run build

      - name: Compress build
        working-directory: "ui"
        run: tar -czf dist.tar.gz dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ui-dist
          path: "ui/dist.tar.gz"

  lint:
    name: Eslint checks
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout code
    needs: generate-openapi-spec
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        id: setup-node
        with:
          node-version-file: ui/.nvmrc

      - name: Install dependencies
        working-directory: "ui"
        run: npm ci

      - name: Download OpenAPI spec artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: openapi-spec
          path: ui/src/api

      - name: Build OpenAPI type definitions
        working-directory: "ui"
        run: npm run build:api

      - name: Prettier
        working-directory: "ui"
        run: npm run format:check

      - name: Eslint
        working-directory: "ui"
        run: npm run lint

      - name: Eslint cyclic imports
        working-directory: "ui"
        run: npm run cyclic-deps-check

      - name: Typescript
        working-directory: "ui"
        run: npm run type-check

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout code
    needs: generate-openapi-spec
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        id: setup-node
        with:
          node-version-file: ui/.nvmrc

      - name: Install dependencies
        working-directory: "ui"
        run: npm ci

      - name: Download OpenAPI spec artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: openapi-spec
          path: ui/src/api

      - name: Build OpenAPI type definitions
        working-directory: "ui"
        run: npm run build:api

      - name: UI Unit tests
        working-directory: "ui"
        run: npm run test:unit

  playwright-tests:
    name: Playwright Tests
    needs:
      - build
      - generate-openapi-spec
    permissions:
      contents: read # to checkout code
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.54.0-noble
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v4.1.2
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || '' }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        id: setup-node
        with:
          node-version-file: ui/.nvmrc

      - name: Install dependencies
        working-directory: "ui"
        run: npm ci

      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: ui-dist
          path: "ui"

      - name: Unpack build
        working-directory: "ui"
        run: tar -xzf dist.tar.gz

      - name: Download OpenAPI spec artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: openapi-spec
          path: ui/src/api

      - name: Build OpenAPI type definitions
        working-directory: "ui"
        run: npm run build:api

      - name: Run Playwright tests
        working-directory: "ui"
        run: npm run test:component -- --project "Component tests"

      - name: Upload blob report to GitHub Actions Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 30
