name: Geti Tune server checks
on:
  merge_group:
    branches:
      - develop
      - release/**
  push:
    tags:
      - "v*"
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions: {} # No permissions by default on workflow level

concurrency:
  group: backend-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Determines if workflow should execute based on event type and changed paths
  # If push or workflow_dispatch -> always run
  # If PR or merge_group -> run only if files in specified paths changed
  check_paths:
    name: Check if workflow should run
    runs-on: overflow
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: ./.github/actions/check-paths
        with:
          files_yaml: |
            test:
              - application/backend/**
              - library/**
              - .github/**

  python-checks:
    strategy:
      matrix:
        os: ["overflow", "windows-latest"]
    name: python-${{ matrix.os }}-checks
    runs-on: ${{ matrix.os }}
    needs: check_paths
    if: needs.check_paths.outputs.run_workflow == 'true'
    permissions:
      contents: read # to checkout code
    steps:
      - *checkout

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          version: "0.10.4"
          enable-cache: false
          python-version: "3.13"

      - name: Install OpenCV dependencies
        if: matrix.os == 'overflow'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0

      - name: Prepare venv and install Python dependencies
        working-directory: application/backend
        env:
          GIT_LFS_SKIP_SMUDGE: "1" # Skip downloading LFS files for deps installed via git
        run: |
          uv lock --check
          uv sync --frozen --extra cpu --extra mqtt

      - name: Check formatting with ruff
        if: matrix.os == 'overflow'
        working-directory: application/backend
        run: |
          uv run ruff check --output-format=github .
          uv run ruff format --check .

      - name: Check imports with import-linter
        if: matrix.os == 'overflow'
        working-directory: application/backend
        run: uv run lint-imports

      - name: Check source code with Pyrefly
        if: matrix.os == 'overflow'
        working-directory: application/backend
        run: uv run pyrefly check

      - name: Run unit tests
        working-directory: application/backend
        run: uv run pytest tests/unit

      - name: Run ubuntu integration tests
        if: matrix.os == 'overflow'
        working-directory: application/backend
        run: uv run pytest tests/integration

      - name: Run windows integration tests # Skip tests with docker issues on Windows
        if: matrix.os == 'windows-latest'
        working-directory: application/backend
        run: uv run pytest --ignore=tests/integration/stream/test_ip_camera_stream.py --ignore=tests/integration/services/dispatchers/test_mqtt.py tests/integration

  # Temporarily skipping BDD tests on CI due to instability and flakiness. Will be re-enabled once the underlying issues are resolved.
  #      - name: Run bdd tests
  #        if: matrix.os == 'overflow'
  #        working-directory: application/backend
  #        run: uv run behave tests/bdd

  required_check:
    name: Required Check backend-lint-and-test
    needs:
      - check_paths
      - python-checks
    runs-on: overflow
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
