name: Geti server checks
on:
  merge_group:
    branches:
      - develop
      - release/**
  push:
    tags:
      - "v*"
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions: {} # No permissions by default on workflow level

concurrency:
  group: backend-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Determines if workflow should execute based on event type and changed paths
  # If push or workflow_dispatch -> always run
  # If PR or merge_group -> run only if files in specified paths changed
  check_paths:
    name: Check if workflow should run
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: ./.github/actions/check-paths
        with:
          files_yaml: |
            test:
              - application/backend/**
              - library/**
              - .github/**

  python-checks:
    strategy:
      matrix:
        os: ["ubuntu", "windows"]
    # Use more descriptive job name for better visibility in CI results
    # Overflow labeled runner is equivalent to ubuntu-latest in terms of resources
    name: python-${{ matrix.os }}-checks
    runs-on: ${{ matrix.os == 'ubuntu' && (github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest') || 'windows-latest' }}
    needs: check_paths
    if: needs.check_paths.outputs.run_workflow == 'true'
    permissions:
      contents: read # to checkout code
    steps:
      - *checkout

      - name: Install Python, uv and Just
        uses: ./.github/actions/install-common-deps
        with:
          uv-version-file: application/backend/pyproject.toml # Install the uv version specified in pyproject.toml

      - name: Install OpenCV dependencies
        if: matrix.os == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0

      - name: Prepare venv and install Python dependencies
        working-directory: application/backend
        env:
          GIT_LFS_SKIP_SMUDGE: "1" # Skip downloading LFS files for deps installed via git
        run: just venv

      - name: Run linters and type-checkers
        if: matrix.os == 'ubuntu'
        working-directory: application/backend
        run: just lint

      - name: Run unit tests
        working-directory: application/backend
        run: just test-unit

      - name: Run integration tests
        working-directory: application/backend
        run: just test-integration

  required_check:
    name: Required Check backend-lint-and-test
    needs:
      - check_paths
      - python-checks
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
