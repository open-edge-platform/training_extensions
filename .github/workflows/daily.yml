name: Daily

on:
  schedule:
    - cron: "0 2 * * *" # Run every day at 2 AM UTC
  workflow_dispatch:

permissions: {} # No permissions by default on workflow level

jobs:
  build:
    name: Daily build
    uses: ./.github/workflows/build.yaml
    with:
      use-cache: false # Verify image is buildable from scratch without any cached layers
    permissions:
      contents: read
      packages: write # to push Docker images to GHCR
      pull-requests: write # required by nested job
      id-token: write # required for signing container images

  backend-lint-and-test:
    name: Daily backend lint and test
    uses: ./.github/workflows/backend-lint-and-test.yaml
    permissions:
      contents: read

  lib-lint-and-test:
    name: Daily library lint and test
    uses: ./.github/workflows/lib-lint-and-test.yaml
    permissions:
      contents: read
      id-token: write # The id-token permission is required by Codecov to use OIDC

  ui-lint-and-test:
    name: Daily UI lint and test
    uses: ./.github/workflows/ui-lint-and-test.yaml
    permissions:
      contents: read
      pull-requests: write # required by nested job

  windows-installer:
    name: Daily Windows installer build (${{ matrix.device }})
    strategy:
      fail-fast: false
      matrix:
        device: [cpu, xpu, cuda]
    uses: ./.github/workflows/windows-installer.yml
    with:
      device: ${{ matrix.device }}
      tag: "daily"
    secrets:
      MSIX_SIGN_CERTIFICATE: ${{ secrets.MSIX_SIGN_CERTIFICATE }}
      MSIX_SIGN_CERTIFICATE_PASSWORD: ${{ secrets.MSIX_SIGN_CERTIFICATE_PASSWORD }}
    permissions:
      contents: read

  check-existing-issue:
    name: Check for existing failure issue
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    needs:
      - build
      - backend-lint-and-test
      - lib-lint-and-test
      - ui-lint-and-test
      - windows-installer
    if: failure()
    permissions:
      issues: read
    outputs:
      issue_exists: ${{ steps.check.outputs.issue_exists }}
    steps:
      - &harden-runner
        name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Check for existing open issue
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.info('Searching for existing open issues with labels: daily-failure, automated');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'daily-failure,automated',
              state: 'open',
            });

            core.info(`Found ${issues.data.length} open issue(s) with matching labels`);

            const matchingIssues = issues.data.filter(issue =>
              issue.title.includes('[Scheduled Check] Daily workflows failed')
            );

            if (matchingIssues.length > 0) {
              core.info(`Found ${matchingIssues.length} matching issue(s):`);
              for (const issue of matchingIssues) {
                core.info(`  - #${issue.number} - "${issue.title}" (${issue.html_url})`);
              }
            } else {
              core.info('No existing issue found, a new one will be created');
            }

            core.setOutput('issue_exists', matchingIssues.length > 0 ? 'true' : 'false');

  create-issue-on-failure:
    name: Create issue on scheduled workflow failure
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    needs:
      - build
      - backend-lint-and-test
      - lib-lint-and-test
      - ui-lint-and-test
      - windows-installer
      - check-existing-issue
    if: failure() && needs.check-existing-issue.outputs.issue_exists == 'false'
    permissions:
      issues: write # Permission to create issues
    steps:
      - *harden-runner

      - name: Create GitHub Issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const workflowRunUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issueTitle = `[Scheduled Check] Daily workflows failed - ${new Date().toISOString().split('T')[0]}`;
            const issueBody = `## Bug Report

            **Type:** Bug

            **Description:** One or more daily workflows failed.

            **Failed Workflow Run:** [View the failed run](${workflowRunUrl})

            **Triggered at:** ${new Date().toISOString()}

            **Workflow:** ${context.workflow}

            **Run ID:** ${context.runId}

            Please investigate the failure and take appropriate action.
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              assignees: ['leoll2'],
              labels: ['daily-failure', 'automated'],
              type: 'Bug'
            });
