name: Build

on:
  merge_group:
    branches:
      - develop
      - release/**
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions: {} # No permissions by default on workflow level

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Determines if workflow should execute based on event type and changed paths
  # If workflow_dispatch or workflow_call -> always run
  # If PR or merge_group -> run only if files in specified paths changed
  check_paths:
    name: Check if workflow should run
    runs-on: overflow
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: ./.github/actions/check-paths
        with:
          files_yaml: |
            test:
              - application/**
              - '!application/docs/**'
              - library/**
              - .github/**

  build:
    name: Build and push docker image (${{ matrix.device }})
    runs-on: overflow
    needs: check_paths
    if: needs.check_paths.outputs.run_workflow == 'true'
    strategy:
      fail-fast: false
      matrix:
        device: [cpu, xpu, cuda]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read application version
        id: version
        run: |
          echo "value=$(cat application/VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/open-edge-platform/geti-${{ matrix.device }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.version.outputs.value }}-dev-${{ steps.version.outputs.short_sha }},enable=${{ github.event_name == 'pull_request' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build Docker image
        id: docker_build
        uses: ./.github/actions/docker-build
        with:
          device: ${{ matrix.device }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
          # Fork PRs cannot write packages to the upstream org, so disable
          # cache export to avoid 403 errors from GHCR.
          cache-write: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request' }}

      - name: Smoke-test healthcheck endpoint
        if: github.event_name == 'pull_request'
        env:
          IMAGE: ${{ steps.docker_build.outputs.image-name }}
          DEVICE: ${{ matrix.device }}
        run: |
          CONTAINER_NAME="geti-healthcheck-${DEVICE}"

          echo "Starting container from ${IMAGE} ..."
          docker run -d --name "${CONTAINER_NAME}" -p 7860:7860 "${IMAGE}"

          # Wait up to 60 seconds for the /health endpoint to respond
          echo "Waiting for /health endpoint ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7860/health; then
              echo ""
              echo "Health check passed!"
              docker rm -f "${CONTAINER_NAME}" > /dev/null 2>&1
              exit 0
            fi
            sleep 2
          done

          echo "Health check failed after 60 seconds."
          docker logs "${CONTAINER_NAME}"
          docker rm -f "${CONTAINER_NAME}" > /dev/null 2>&1
          exit 1

  required_check:
    name: Required Check build
    needs:
      - check_paths
      - build
    runs-on: overflow
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
