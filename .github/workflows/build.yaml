name: Build

on:
  merge_group:
    branches:
      - develop
      - release/**
  push:
    tags:
      - "v*"
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions: {} # No permissions by default on workflow level

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Determines if workflow should execute based on event type and changed paths
  # If push or workflow_dispatch -> always run
  # If PR or merge_group -> run only if files in specified paths changed
  check_paths:
    name: Check if workflow should run
    runs-on: overflow
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: ./.github/actions/check-paths
        with:
          files_yaml: |
            test:
              - application/**
              - '!application/docs/**'
              - library/**
              - .github/**

  # Pre-build shared Docker stages (backend-base, web-ui, runtime-base) so that
  # device-specific builds can reuse them from cache instead of rebuilding independently.
  # This avoids tripling the work for stages that are identical across cpu/xpu/cuda.
  build-shared-cache:
    name: Build shared Docker stages cache
    runs-on: overflow
    needs: check_paths
    if: needs.check_paths.outputs.run_workflow == 'true'
    permissions:
      contents: read
      actions: write # Required for type=gha Docker layer cache
    steps:
      - *checkout

      - name: Set up Docker
        uses: docker/setup-docker-action@1a6edb0ba9ac496f6850236981f15d8f9a82254d # v5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8016837eba79c3b51bf2025379f48b6fc50f1236 # v4.0.0

      - name: Build and cache shared stages
        working-directory: application
        run: |
          # Build up to runtime-base (the last shared stage before device-specific targets).
          # This caches: backend-base, cpu-base (used by geti-cpu), web-ui, runtime-base.
          # Device-specific stages (cuda-base, xpu-base) are NOT built here since they diverge.
          docker buildx build \
            --build-arg http_proxy --build-arg https_proxy --build-arg no_proxy \
            --build-arg HTTP_PROXY --build-arg HTTPS_PROXY --build-arg NO_PROXY \
            "$(git rev-parse --show-toplevel)" \
            -f docker/Dockerfile \
            --target runtime-base \
            --cache-from type=gha,scope=shared \
            --cache-to type=gha,mode=max,scope=shared \
            --load

  build:
    name: Build and upload docker image (${{ matrix.device }})
    runs-on: overflow
    needs:
      - check_paths
      - build-shared-cache
    if: needs.check_paths.outputs.run_workflow == 'true'
    strategy:
      matrix:
        device: [cpu, xpu, cuda]
    permissions:
      contents: read
      actions: write # Required for type=gha Docker layer cache
    steps:
      - *checkout

      # Install the latest Docker, since the version available by default on the runners may be outdated
      - name: Set up Docker
        uses: docker/setup-docker-action@1a6edb0ba9ac496f6850236981f15d8f9a82254d # v5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8016837eba79c3b51bf2025379f48b6fc50f1236 # v4.0.0

      - name: Install Python, uv and Just
        uses: ./.github/actions/install-common-deps
        with:
          uv-version-file: application/backend/pyproject.toml # Install the uv version specified in pyproject.toml

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build image for ${{ matrix.device }}
        working-directory: application
        run: |
          just build-image \
            --accelerator $DEVICE \
            --tag "$(echo "$TAGS" | head -1)" \
            --extra-tags "$(echo "$TAGS" | tail -n +2 | tr '\n' ' ')"
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DEVICE: ${{ matrix.device }}
          BUILDX_CACHE_FROM: "type=gha,scope=${{ matrix.device }} type=gha,scope=shared"
          BUILDX_CACHE_TO: "type=gha,mode=max,scope=${{ matrix.device }}"

      - name: Run simple checks on the built image
        working-directory: application
        run: |
          FIRST_TAG=$(echo "$TAGS" | awk 'NR==1 {print $1}')
          echo "Testing container with tag: $FIRST_TAG for device: $DEVICE"

          CONTAINER_NAME="geti-${DEVICE}"

          # Start the container in detached mode
          just run-image --accelerator $DEVICE --tag $FIRST_TAG --name $CONTAINER_NAME --detach

          # Cleanup container on exit
          cleanup() {
              echo "--- Container logs ---"
              docker logs "$CONTAINER_NAME" || true
              echo "--- Stopping container ---"
              docker stop "$CONTAINER_NAME" || true
          }
          trap cleanup EXIT

          TEST_URL="localhost:7860"
          echo "Waiting for container to be ready..."
          HEALTH_OK=false
          for i in {1..12}; do
              if curl -sf $TEST_URL/health > /dev/null 2>&1; then
                  echo "✅ Health check passed!"
                  HEALTH_OK=true
                  break
              fi
              echo "Attempt $i/12 - waiting 5 seconds..."
              sleep 5
          done

          if [[ "$HEALTH_OK" != "true" ]]; then
              echo "❌ Health check failed after 60 seconds"
              exit 1
          fi

          EXPECTED_TITLE="Geti Tune"
          echo "Checking HTML title..."

          HTML_CONTENT=$(curl -sf $TEST_URL)
          if echo "$HTML_CONTENT" | grep -q "<title>.*$EXPECTED_TITLE.*</title>"; then
              echo "✅ HTML title check passed - found: $EXPECTED_TITLE"
          else
              echo "❌ HTML title check failed - expected title '$EXPECTED_TITLE' not found"
              echo "Actual HTML content:"
              echo "$HTML_CONTENT"
              exit 1
          fi

          echo "All checks passed successfully!"
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DEVICE: ${{ matrix.device }}

      - name: Get Docker image sizes
        working-directory: application/docker
        id: image-sizes
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p image-sizes

          echo "| Image | Size |" > image-sizes/${DEVICE}.md
          echo "|-------|------|" >> image-sizes/${DEVICE}.md

          for TAG in $TAGS ; do
            IMAGE="geti-${DEVICE}:${TAG}"
            if docker image inspect "$IMAGE" >/dev/null 2>&1; then
              size_bytes=$(docker image inspect "$IMAGE" --format='{{.Size}}')
              size_readable=$(numfmt --to=si --format "%.2f" "$size_bytes")
              echo "| $IMAGE | $size_readable |" >> image-sizes/${DEVICE}.md
            fi
          done
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DEVICE: ${{ matrix.device }}

      - name: Upload image sizes
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: image-sizes-${{ matrix.device }}
          path: application/docker/image-sizes/${{ matrix.device }}.md
          retention-days: 1

      - name: Extract first tag
        id: first-tag
        run: |
          FIRST_TAG=$(echo "$TAGS" | awk 'NR==1 {print $1}')
          echo "tag=${FIRST_TAG}" >> $GITHUB_OUTPUT
        env:
          TAGS: ${{ steps.meta.outputs.tags }}

      - name: Upload image as artifact
        # Image upload is heavy and slow, so we skip it on PRs
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: ishworkh/container-image-artifact-upload@5d71a2417f0576fa11fe770fb04ece58c4587714
        with:
          image: "geti-${{ matrix.device }}:${{ steps.first-tag.outputs.tag }}"
          retention_days: "3"
        continue-on-error: true
        env:
          FIRST_TAG: ${{ steps.first-tag.outputs.tag }}

  comment-sizes:
    name: Comment PR with all image sizes
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: overflow
    permissions:
      pull-requests: write
    continue-on-error: true
    steps:
      - name: Download all image size artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: image-sizes-*
          merge-multiple: true
          path: image-sizes

      - name: Combine image sizes and comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read all device size files
            const sizesDir = 'image-sizes';
            const files = fs.readdirSync(sizesDir).sort();

            let comment = '## Docker Image Sizes\n\n';

            for (const file of files) {
              const device = path.basename(file, '.md');
              const content = fs.readFileSync(path.join(sizesDir, file), 'utf8');
              comment += `### ${device.toUpperCase()}\n\n${content}\n\n`;
            }

            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.data.find(comment =>
              comment.body.includes('## Docker Image Sizes')
            );

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

  required_check:
    name: Required Check build
    needs:
      - check_paths
      - build-shared-cache
      - build
    runs-on: overflow
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
