name: Build

on:
  merge_group:
    branches:
      - develop
      - release/**
  pull_request:
  workflow_call:
    inputs:
      use-cache:
        description: "Enable Docker build cache (set to false for cache-free verification builds)"
        type: boolean
        default: true
  workflow_dispatch:

permissions: {} # No permissions by default on workflow level

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Determines if workflow should execute based on event type and changed paths
  # If workflow_dispatch or workflow_call -> always run
  # If PR or merge_group -> run only if files in specified paths changed
  check_paths:
    name: Check if workflow should run
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: ./.github/actions/check-paths
        with:
          files_yaml: |
            test:
              - application/**
              - '!application/docs/**'
              - library/**
              - .github/**

  build:
    name: Build and push docker image (${{ matrix.device }})
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    needs: check_paths
    if: needs.check_paths.outputs.run_workflow == 'true'
    strategy:
      fail-fast: false
      matrix:
        device: [cpu, xpu, cuda]
    permissions:
      contents: read
      packages: write # Push Docker images to GHCR
      pull-requests: write # Post image size comments on PRs
      id-token: write # Use OIDC token to sign images
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Read application version
        id: version
        run: |
          echo "value=$(cat application/VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/open-edge-platform/geti-${{ matrix.device }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.version.outputs.value }}-dev-${{ steps.version.outputs.short_sha }},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=${{ github.ref_name }},enable=${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build Docker image
        id: docker_build
        uses: ./.github/actions/docker-build
        with:
          device: ${{ matrix.device }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
          use-cache: ${{ github.event_name != 'workflow_call' || inputs.use-cache }}
          # Fork PRs cannot write packages to the upstream org, so disable
          # cache export to avoid 403 errors from GHCR.
          cache-write: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request' }}

      - name: Resolve primary image tag for signing
        if: github.event_name != 'pull_request'
        id: primary-tag
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Use the first tag as the signing reference.
          # The sign-image action resolves the digest from this tag via crane.
          TAG="$(echo "$TAGS" | head -n1)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Sign container image
        if: github.event_name != 'pull_request'
        uses: open-edge-platform/geti-ci/actions/sign-image@7e686c1248b3939f8ee8e04e2612da727e379d91
        with:
          image-uri: ${{ steps.primary-tag.outputs.tag }}

      - name: Pull image for smoke test
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ${{ steps.meta.outputs.tags }}
        run: |
          # Extract first tag from the list
          FIRST_TAG=$(echo "${IMAGE}" | head -n1)
          echo "Pulling ${FIRST_TAG} for smoke test..."
          docker pull "${FIRST_TAG}"

      - name: Smoke-test docker image
        env:
          # For PRs use local image, for other events use first pushed tag
          IMAGE_SOURCE: ${{ github.event_name == 'pull_request' && steps.docker_build.outputs.image-name || steps.meta.outputs.tags }}
          DEVICE: ${{ matrix.device }}
        run: |
          # Extract first tag if IMAGE_SOURCE contains multiple lines
          IMAGE=$(echo "${IMAGE_SOURCE}" | head -n1)
          CONTAINER_NAME="geti-healthcheck-${DEVICE}"

          echo "Starting container from ${IMAGE} ..."
          docker run -d --name "${CONTAINER_NAME}" -p 7860:7860 "${IMAGE}"

          # Wait up to 60 seconds for the /health endpoint to respond
          echo "Waiting for /health endpoint ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7860/health; then
              echo ""
              echo "Backend health check passed!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend health check failed after 60 seconds."
              docker logs "${CONTAINER_NAME}"
              docker rm -f "${CONTAINER_NAME}" > /dev/null 2>&1
              exit 1
            fi
            sleep 2
          done

          # Verify the UI is being served
          TEST_URL="http://localhost:7860"
          EXPECTED_TITLE="Geti"
          echo "Checking HTML title..."

          HTML_CONTENT=$(curl -sf $TEST_URL)
          if echo "$HTML_CONTENT" | grep -q "<title>.*$EXPECTED_TITLE.*</title>"; then
            echo "✅ HTML title check passed - found: $EXPECTED_TITLE"
          else
            echo "❌ HTML title check failed - expected title '$EXPECTED_TITLE' not found"
            echo "Actual HTML content:"
            echo "$HTML_CONTENT"
            docker logs "${CONTAINER_NAME}"
            docker rm -f "${CONTAINER_NAME}" > /dev/null 2>&1
            exit 1
          fi

          docker rm -f "${CONTAINER_NAME}" > /dev/null 2>&1

      - name: Install Python, uv and Just
        if: matrix.device == 'cpu'
        uses: ./.github/actions/install-common-deps
        with:
          uv-version-file: application/backend/pyproject.toml # Install the uv version specified in pyproject.toml

      - name: Prepare venv and install Python dependencies
        if: matrix.device == 'cpu'
        working-directory: application/backend
        env:
          GIT_LFS_SKIP_SMUDGE: "1" # Skip downloading LFS files for deps installed via git
        run: just venv

      - name: Run bdd tests
        if: matrix.device == 'cpu'
        working-directory: application/backend
        env:
          # For PRs use local image, for other events use first pushed tag
          IMAGE_SOURCE: ${{ github.event_name == 'pull_request' && steps.docker_build.outputs.image-name || steps.meta.outputs.tags }}
          RUNNER: docker
          TESTCONTAINERS_RYUK_DISABLED: true
        run: |
          export IMAGE_TAG=$(echo "${IMAGE_SOURCE}" | head -n1)
          export DOCKER_HOST=$(docker context inspect --format '{{.Endpoints.docker.Host}}')
          just test-bdd

      - name: Get Docker image size
        if: github.event_name == 'pull_request'
        id: image_size
        env:
          IMAGE: ${{ steps.docker_build.outputs.image-name }}
        run: |
          # docker image inspect .Size may undercount with the docker buildx
          # driver because it only reports the diff/top-layer size.  Summing
          # all layer sizes via `docker history` gives the true uncompressed
          # on-disk total.
          SIZE_BYTES=$(docker history "${IMAGE}" --format '{{.Size}}' \
            | awk '
                /[0-9]+(\.[0-9]+)?[kKmMgG]?[bB]/ {
                  n = $1+0; unit = $1;
                  gsub(/[0-9.]+/, "", unit);
                  unit = toupper(unit);
                  if (unit == "KB") n *= 1024;
                  else if (unit == "MB") n *= 1024*1024;
                  else if (unit == "GB") n *= 1024*1024*1024;
                  total += n
                }
                END { printf "%d", total }
              ')
          SIZE_MB=$(awk "BEGIN {printf \"%.1f\", ${SIZE_BYTES} / 1024 / 1024}")
          SIZE_GB=$(awk "BEGIN {printf \"%.2f\", ${SIZE_BYTES} / 1024 / 1024 / 1024}")
          echo "bytes=${SIZE_BYTES}" >> "$GITHUB_OUTPUT"
          echo "human=${SIZE_MB} MB (${SIZE_GB} GB)" >> "$GITHUB_OUTPUT"

      - name: Post image size comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEVICE: ${{ matrix.device }}
          SIZE_HUMAN: ${{ steps.image_size.outputs.human }}
        run: |
          MARKER="<!-- docker-image-size -->"
          HEADER="${MARKER}
          ### 🐳 Docker image sizes

          | Device | Size |
          |--------|------|"
          NEW_ROW="| \`${DEVICE}\` | ${SIZE_HUMAN} |"

          # Find the shared comment
          COMMENT_ID=$(gh api \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --paginate --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
          | head -n1)

          if [ -n "${COMMENT_ID}" ]; then
            # Read the current body, replace or append the device row
            EXISTING=$(gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" --jq .body)
            if echo "${EXISTING}" | grep -q "| \`${DEVICE}\`"; then
              BODY=$(echo "${EXISTING}" | sed "s/| \`${DEVICE}\` |.*/${NEW_ROW}/")
            else
              BODY="${EXISTING}
          ${NEW_ROW}"
            fi
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" \
              -f body="${BODY}"
          else
            BODY="${HEADER}
          ${NEW_ROW}"
            gh pr comment "${PR_NUMBER}" --body "${BODY}"
          fi

  required_check:
    name: Required Check build
    needs:
      - check_paths
      - build
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
